          - entity: select.dreame_a2_mower_navigation_path
      - type: entities
        title: Obstacle avoidance
        entities:
          - entity: switch.dreame_a2_mower_ai_obstacle_photos
      - type: entities
        title: Weather protection
        entities:
          - entity: switch.dreame_a2_mower_rain_protection
          - entity: select.dreame_a2_mower_rain_protection_resume_hours
          - entity: switch.dreame_a2_mower_frost_protection
      - type: entities
        title: Session stats
        entities:
          - entity: sensor.dreame_a2_mower_latest_session_area
          - entity: sensor.dreame_a2_mower_latest_session_duration
          - entity: sensor.dreame_a2_mower_latest_session_time
          - entity: sensor.dreame_a2_mower_area_mowed
          - entity: sensor.dreame_a2_mower_session_distance
      - type: markdown
        content: |
          **Note:** mowing height and blade speed are not yet surfaced as
          entities in this integration. Use the Dreamehome app for those
          settings until a future task adds them.

