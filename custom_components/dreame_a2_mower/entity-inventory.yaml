      last_verified: "2026-05-31"
    verifications:
      - date: "2026-05-31"
        status: presumed
        claim: "Ported from code 2026-05-31: serves coordinator._work_log_png (set by DreameA2WorkLogSelect picker); falls back to _active_map_base_png (clean base, no trail) when no session is picked. Rotates access_token on PNG change. Read from _camera_map.py:206-275; not re-confirmed live."
        evidence: "_camera_map.py:222-225 (__init__ → mower_unique_id 'work_log'); _camera_map.py:228-240 (_resolve_png); _camera_map.py:242-245 (async_camera_image)"
    references:
      wire_entry: "event_s4eiid1"
      code: "custom_components/dreame_a2_mower/_camera_map.py:206"
    notes: |
      Work-log replay camera on the parent device. Driven exclusively by
      DreameA2WorkLogSelect (select.dreame_a2_mower_work_log); periodic
      coordinator refreshes do NOT update it (_attr_should_poll=False).
      Empty state shows active-map clean base render (no trail/mower icon)
      rather than None, so the card shows "this is where work logs render"
      context even before a session is picked. Access_token rotated on
      each PNG change for cache-busting (broadcast-render-broadcast pattern).

