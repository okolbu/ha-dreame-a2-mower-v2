# custom_components/dreame_a2_mower/services.yaml

set_active_selection:
  description: >
    Set the ordered list of zones or spots to be mowed by the next "Start"
    action when action_mode is zone or spot. Updates the integration's
    persistent selection state.
  fields:
    zones:
      description: Zone IDs in mowing order. Empty list to clear zone selection.
      example: "[3, 1, 2]"
      selector:
        object:
    spots:
      description: Spot IDs in mowing order. Empty list to clear spot selection.
      example: "[1]"
      selector:
        object:

mow_zone:
  description: >
    One-shot — set zone selection then start mowing. Equivalent to
    set_active_selection with zones=… followed by lawn_mower.start_mowing
    when action_mode=zone.
  fields:
    zone_ids:
      description: Zone IDs in mowing order.
      required: true
      example: "[3, 1, 2]"
      selector:
        object:

mow_edge:
  description: >
    Edge-mow specific contours. Each contour_id is a [map_id, contour_id]
    pair as returned by the cloud map. Pass an empty list (or omit
    contour_ids) to edge every contour in the current map.
  fields:
    contour_ids:
      description: List of [map_id, contour_id] pairs, e.g. [[1, 0], [1, 1]].
      example: "[[1, 0]]"
      selector:
        object:

mow_spot:
  description: >
    Mow one or more named spot zones (defined in the Dreame app and
    served by the cloud map). Spot IDs are visible as the suffix on
    select.spot's options.
  fields:
    spot_ids:
      description: Spot zone IDs to mow.
      required: true
      example: "[1, 2]"
      selector:
        object:

recharge:
  description: Send the mower to the charging dock immediately.

find_bot:
  description: Make the mower beep so you can locate it.

lock_bot:
  description: Toggle the child lock.

suppress_fault:
  description: Clear a recoverable error condition.

finalize_session:
  description: >
    Manually finalize the in-progress session. Use when the cloud-side
    session-summary fetch fails permanently and the in-progress entry
    is stuck. F5 wires the auto-finalize gate; this is the user-facing
    escape hatch.

replay_session:
  description: >
    Render an archived session's path into the work-log camera for
    playback. The camera entity shows the replay until the user selects
    the work-log picker's placeholder entry (which clears the replay),
    or the config entry is reloaded. No periodic refresh clears it
    automatically.
  fields:
    session_md5:
      description: MD5 of the session to replay (matches sensor.archived_session_count's attributes).
      required: true
      example: "abcd1234..."
      selector:
        text:

show_lidar_fullscreen:
  name: Show LiDAR fullscreen
  description: >
    Fires a `dreame_a2_mower_lidar_fullscreen` event on the HA bus.
    Lovelace cards configured to listen for this event can pop up the
    full-resolution LiDAR view. No parameters today; the convention
    exists for future extensibility.
  fields: {}

dump_map_diagnostics:
  name: Dump map diagnostics
  description: >
    One-off diagnostic service for nav_paths investigation. Fetches raw
    cloud batch data and logs per-map top-level keys, non-empty slot
    counts, and probes alternative batch prefixes (M_PATH, PATH, NAV,
    LINK, MPATH). Results appear in the HA log at WARNING level with the
    prefix "dump_map_diagnostics:". No parameters required.
  fields: {}

discover_cloud_api:
  name: Discover cloud API
  description: >
    Recursive cloud-API discovery service. Fetches the full batch via an
    empty-list get_batch_device_datas call (which returns every key the
    cloud has for this device), groups keys by prefix family, reassembles
    chunked families (PREFIX.0..N + PREFIX.info), JSON-decodes them, and
    walks the structure recording type / key-list / sample values at each
    path. Also probes every cfg_individual endpoint in the integration's
    catalog (CFG, DEV, NET, MAPL, MISTA, etc.). Writes a structured
    report to <config>/dreame_a2_mower/api_discovery.json. No parameters
    required; results available via SCP within ~10 seconds.
  fields: {}

set_schedule_plans:
  name: Set schedule plans
  description: >
    Replace one slot's full plan list (Spring & Summer or Autumn & Winter)
    with a new set of mowing plans. The cloud's atomic unit is the slot
    blob, so this service replaces the entire slot rather than mutating
    individual plans. Used by the bundled Schedule custom card.
  fields:
    slot_id:
      name: Slot ID
      description: 0 = Spring & Summer, 1 = Autumn & Winter
      required: true
      example: 0
      selector: { number: { min: 0, max: 1, step: 1 } }
    plans:
      name: Plans
      description: >
        List of plans. Each plan is a dict with keys: time_min (int 0-1439),
        weekday_mask (int 1-127, bit 0 = Mon), action_type (0=All-area,
        1=Zone, 2=Edge), zone_id (int, required for Zone/Edge),
        extra_bytes_hex (str, hex-encoded, optional — only Edge has this
        for round-trip fidelity).
      required: true

refresh_cloud_state:
  name: Refresh cloud state
  description: >
    Force an on-demand pull of all cloud-derived state (CFG, SETTINGS,
    SCHEDULE, MAP, MIHIS, etc.). Same code path as the periodic 10-min
    poll and the s6p2 MQTT tripwire, but fires immediately. Use it
    when you've just changed a setting in the Dreame app and want HA
    to catch up without waiting, or as a manual smoke-test to confirm
    "everything is current right now". No parameters required.
  fields: {}

set_language:
  name: Set language
  description: >
    Set the mower's text and/or voice language indices. Wire format
    verified live 2026-05-09 on g2408 fw 4.3.6_0550 — the routed-action
    `s2.50 m='s' t='LANG'` accepts a tagged-union dict
    `{type: 'text'|'voice', value: <int>}`. The service emits one write
    per parameter, then forces a cloud refresh so MowerState catches up.
    The index → language-name mapping is firmware-locale-specific and
    not yet fully enumerated (known: voice=7 is Norwegian on this
    device). Use the Dreame app to discover other indices, then call
    this service with the value you want.
  fields:
    text:
      description: New value for CFG.LANG[0] (text language index).
      example: 2
      selector:
        number:
          min: 0
          max: 99
          mode: box
    voice:
      description: New value for CFG.LANG[1] (voice language index).
      example: 7
      selector:
        number:
          min: 0
          max: 99
          mode: box

move_lidar_scan:
  name: Move LiDAR scan between maps
  description: >
    Move an archived LiDAR scan from one map's archive directory to
    another's. Updates both index.json files. Useful for re-tagging
    scans that landed in the wrong map's archive after the T12
    flat-to-per-map migration.
  fields:
    from_map_id:
      name: From map_id
      description: Source map_id (0 = Map 1, 1 = Map 2)
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 10
          step: 1
    filename:
      name: Filename
      description: PCD filename to move (must exist in from_map's archive)
      required: true
      example: "2026-04-19_1776600634_98251e68.pcd"
      selector:
        text:
    to_map_id:
      name: To map_id
      description: Destination map_id
      required: true
      example: 1
      selector:
        number:
          min: 0
          max: 10
          step: 1

show_photo_privacy_policy:
  name: Show AI photo capture privacy policy
  description: >
    Create an HA persistent_notification containing the verbatim Dreame
    "AI Obstacle Recognition Privacy Policy" — the policy text the
    Dreame app gates behind its "Privacy Policy for Capturing and
    Transmitting Photos" sub-menu. Use this to review the policy from
    inside HA before accepting it in the Dreame app. The integration
    cannot accept the policy on your behalf (REC writes return r=-3
    on this firmware, and a privacy policy that flips without an
    explicit accept-screen would be a UX bug). The acceptance state
    itself is surfaced read-only at
    binary_sensor.dreame_a2_mower_photo_consent.
  fields: {}

