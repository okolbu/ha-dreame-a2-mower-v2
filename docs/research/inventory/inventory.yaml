    name: "energy_index"
    category: "property"
    payload_shape: "int"
    unit:
      wire: "unsigned_byte"
      display: "energy_index"
      scale: 1.0
      notes: "Range 1-250; push-on-change."
    semantic: |
      Energy / discharge index property (upstream dreame-mower const.py:83,
      comment "energy/discharge index property"). Observed range 1–250. Upstream
