# State-machine audit expectations
#
# One entry per entity, keyed by `<platform>.<key>`. Drives the audit
# verifier in tools/state_machine_audit.py.
#
# Schema:
#   <platform>.<key>:
#     holder: snapshot | mower_state | cloud_state | live_map | other
#     idle:   "persisted_value" | <literal>    # value expected at cold-start
#                                              # with no MQTT activity.
#     reboot: required | unavailable_ok        # required → must survive HA
#                                              # reboot; reading from a
#                                              # non-persisted source = RED.
#
# Idle literals:
#   - 0, "", null            — literal expected value
#   - "persisted_value"      — any non-None value carried over from snapshot
#   - "unavailable"          — entity is expected to be unavailable when idle
#
# Add a `note` field to explain non-obvious decisions.

# ---------------------------------------------------------------------------
# binary_sensor
# ---------------------------------------------------------------------------

binary_sensor.battery_temp_low:
  holder: mower_state
  idle: false
  reboot: required
  note: "Fault flag from s1p1 heartbeat. Idle = no fault → False."

binary_sensor.cloud_connected:
  holder: snapshot
  idle: null
  reboot: unavailable_ok
  note: "snapshot.mqtt_connectivity == ONLINE; helper returns None until snapshot.last_heartbeat_unix is set, so cold-start = None (idle: null). State machine flips to STALE after HB_STALENESS_S=90 s."

binary_sensor.bumper:
  holder: mower_state
  idle: false
  reboot: required
  note: "Fault flag from heartbeat byte. Idle = no fault → False."

binary_sensor.dock_in_lawn_region:
  holder: mower_state
  idle: unavailable
  reboot: unavailable_ok
  note: "CFG-backed (cloud cache); briefly Unknown at cold-start until cloud poll fills (~5-30s)."

binary_sensor.drop_tilt:
