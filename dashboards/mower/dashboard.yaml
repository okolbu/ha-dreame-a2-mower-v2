              # Col 2 — Custom Mode placeholder
              - type: markdown
                content: |
                  ### 🚧 Custom Mode (Plan 2)

                  Per-zone settings overrides. Read via
                  `sensor.dreame_a2_mower_map_N_custom_mode_overrides` (state
                  attributes list zones with overrides). Write via services
                  `dreame_a2_mower.set_zone_setting(map_id, zone_id, key,
                  value)` and `dreame_a2_mower.clear_zone_setting(map_id,
                  zone_id, key)`.

              # Col 3 — Pathway Obstacle Avoidance placeholder
              - type: markdown
                content: |
                  ### 🚧 Pathway Obstacle Avoidance (Plan 2)

                  Per-map switch + sub-numbers for sensitivity/threshold.

  - title: Schedule
    path: schedule
    type: panel
    icon: mdi:calendar-clock
    cards:
      - type: vertical-stack
        cards:
          - *tab_header_schedule

          # 2-column layout: tall calendar (left) | stacked slots + device-wide (right)
          - type: grid
            columns: 2
            square: false
            cards:
              # Col 1 — Weekly grid. `custom:dreame-a2-schedule-card` is bundled
              # with the integration at /www/dreame-a2-schedule-card.js. It
              # renders the per-slot `plans` (time + days + mode) as a 7-day
              # grid. The card is tall; the right column stacks two cards
              # beside it instead of starting a new row.
              - type: custom:dreame-a2-schedule-card
                sensor: sensor.dreame_a2_mower_schedule_count

              # Col 2 — vertical stack of slots list (top) + device-wide
              # time windows (bottom).
              - type: vertical-stack
                cards:
                  - type: markdown
                    content: >-
                      ### Slots


                      {% set slots = state_attr('sensor.dreame_a2_mower_schedule_count', 'slots') or [] %}

                      {% if not slots %}

                      _No schedule slots configured._

                      {% else %}

                      {% for s in slots %}

                      **Slot {{ s.slot_id }} — {{ s.name }}**

                      {% for p in s.plans %}

                      - `{{ p.time }}` · {{ p.days | join(', ') }} · {{ p.action }}{% if p.zone_id %} (zone {{ p.zone_id }}){% endif %}

                      {% endfor %}


                      {% endfor %}

                      {% endif %}

                  - type: entities
                    title: Device-wide time windows
                    entities:
                      - entity: time.dreame_a2_mower_dnd_start_time
                        name: DnD start
                      - entity: time.dreame_a2_mower_dnd_end_time
                        name: DnD end
                      - entity: time.dreame_a2_mower_low_speed_at_night_start_time
                        name: Low-speed start
                      - entity: time.dreame_a2_mower_low_speed_at_night_end_time
                        name: Low-speed end
                      - entity: time.dreame_a2_mower_charging_start_time
                        name: Charging start
                      - entity: time.dreame_a2_mower_charging_end_time
                        name: Charging end

  - title: LiDAR
    path: lidar
    type: panel
    icon: mdi:radar
    cards:
      - type: vertical-stack
        cards:
          - *tab_header_lidar

          # 1fr 2fr 1fr row: archive (25%) | lidar card (50%) | re-tag (25%).
          # `type: grid` doesn't support per-child cell-spanning that survives
          # HA's hui-card wrapper, so we use a horizontal-stack and override
          # its #root flex layout to a CSS grid with explicit column widths.
          - type: horizontal-stack
            card_mod:
              style: |
                #root {
                  display: grid !important;
                  grid-template-columns: 1fr 2fr 1fr !important;
                  gap: 8px !important;
                }
            cards:
              - type: entities
                title: Archive
                entities:
                  - entity: sensor.dreame_a2_mower_lidar_archive_count
                    name: Total scans
                  - entity: select.dreame_a2_mower_lidar_archive
                    name: Selected scan

              - type: custom:dreame-a2-lidar-card
                url: /api/dreame_a2_mower/lidar/selected.pcd
                picker_entity: select.dreame_a2_mower_lidar_archive

              - type: markdown
                content: |
                  ### Re-tag a mis-categorized scan
                  Use **Developer Tools → Services** with
                  `dreame_a2_mower.move_lidar_scan` — provide `from_map_id`,
                  `filename` (from picker option text), `to_map_id`.

  - title: WiFi Coverage
    path: wifi
    type: panel
    icon: mdi:wifi
    cards:
      - type: vertical-stack
        cards:
          - *tab_header_wifi

          # 1fr 2fr 1fr row: viewer controls (25%) | heatmap (50%) | refresh (25%).
          # See LiDAR tab for why horizontal-stack + #root grid-template-columns
          # is used instead of `type: grid` with span — HA's hui-card wrapper
          # blocks the :host { grid-column: span 2 } trick.
          - type: horizontal-stack
            card_mod:
              style: |
                #root {
                  display: grid !important;
                  grid-template-columns: 1fr 2fr 1fr !important;
                  gap: 8px !important;
                }
            cards:
              - type: entities
                title: Viewer controls
                show_header_toggle: false
                entities:
                  - entity: select.dreame_a2_mower_wifi_archive
                    name: Heatmap
                  - entity: input_boolean.dreame_a2_mower_wifi_flip_x
                    name: Flip X (override)
                    icon: mdi:flip-horizontal
                  - entity: input_boolean.dreame_a2_mower_wifi_flip_y
                    name: Flip Y (override)
                    icon: mdi:flip-vertical
                  - entity: sensor.dreame_a2_mower_wifi_map_last_refresh
                    name: Last refresh

              # Heatmap alone via picture-entity. Base-map overlay was attempted
              # via picture-elements with image_entity — broken across HA's
              # streaming-vs-static camera proxy paths for our custom static
              # cameras. Deferred until heatmap → map_id correlation is solved
              # (see docs/research/wifi-heatmap-todo.md Issue #4).
              - type: picture-entity
                entity: camera.dreame_a2_mower_wifi_heatmap_selected
                name: WiFi heatmap
                camera_view: auto
                show_state: false
                tap_action:
                  action: none
                hold_action:
                  action: none

              - type: entities
                entities:
                  - entity: button.dreame_a2_mower_refresh_wifi_heatmaps
                    name: Refresh WiFi heatmaps (all maps)

  - title: Sessions
    path: sessions
    icon: mdi:history
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - *tab_header_sessions
          # ───── Top row: cross-session widgets (left) + big replay map (right) ─────
          # card_mod override: align-items:flex-start so the picture-entity
          # in the right column doesn't stretch vertically to match the tall
          # left column. The picture card now ends at its image's bottom
          # (about 828 px square), and the area below it next to the rest
          # of the left column is empty page background. Trade-off vs. the
          # previous "tall picture card with white space below the image":
          # same total whitespace, just outside the card frame instead of
          # inside it.
          - type: horizontal-stack
            card_mod:
              style: |
                #root {
                  align-items: flex-start !important;
                }
            cards:
              - type: vertical-stack
                cards:
                  - type: custom:atomic-calendar-revive
                    name: Mowing sessions
                    defaultMode: Calendar
                    maxDaysToShow: 31
                    showColors: true
                    showLocation: false
                    showRelativeTime: false
                    entities:
                      - entity: calendar.dreame_a2_mower_sessions
                        icon: mdi:robot-mower
                  - type: entities
                    title: Replay picker
                    entities:
                      - entity: select.dreame_a2_mower_work_log
                        name: Session
                      - entity: input_boolean.dreame_a2_mower_animate_session
                        name: Animate replay (≤30s SVG)
                  - type: entities
                    title: Latest archived
                    entities:
                      - entity: sensor.dreame_a2_mower_latest_session_duration
                        name: Latest duration
                      - entity: sensor.dreame_a2_mower_latest_session_area
                        name: Latest area mowed (m²)
                      - entity: sensor.dreame_a2_mower_latest_session_time
                        name: Latest started at
                      - entity: sensor.dreame_a2_mower_archived_session_count
                        name: Archived count
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.dreame_a2_mower_mowing_session_active
                        state: "on"
                    card:
                      type: entities
                      title: Live session
                      entities:
                        - entity: sensor.dreame_a2_mower_session_distance
                          name: Distance (m)
                        - entity: sensor.dreame_a2_mower_session_track_point_count
                          name: Track points
                  - type: entities
                    title: Per-map session totals
                    entities:
                      - entity: sensor.dreame_a2_mower_map_1_total_area_mowed
                        name: Map 1 — total area mowed
                      - entity: sensor.dreame_a2_mower_map_1_total_mowing_time
                        name: Map 1 — total time
                      - entity: sensor.dreame_a2_mower_map_1_mowing_sessions
                        name: Map 1 — sessions
                      - entity: sensor.dreame_a2_mower_map_2_total_area_mowed
                        name: Map 2 — total area mowed
                      - entity: sensor.dreame_a2_mower_map_2_total_mowing_time
                        name: Map 2 — total time
                      - entity: sensor.dreame_a2_mower_map_2_mowing_sessions
                        name: Map 2 — sessions
              # Static work-log image (default). Toggle ON the
              # input_boolean.dreame_a2_mower_animate_session helper to
              # switch to the animated SVG replay below.
              - type: conditional
                conditions:
                  - entity: input_boolean.dreame_a2_mower_animate_session
                    state: "off"
                card:
                  type: picture-entity
                  entity: camera.dreame_a2_mower_work_log
                  name: Session replay
                  camera_view: auto
                  show_state: false
                  aspect_ratio: 1/1
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  # Default HA picture-entity uses object-fit:cover so the
                  # camera image fills the card and crops anything that
                  # doesn't match its aspect ratio. Map 1 (portrait) got
                  # top/bottom clipped; Map 2 (landscape) got sides
                  # clipped. Switch to `contain` so the whole image fits
                  # inside the square frame with letterboxing instead.
                  # The `hui-image $` selector tells card-mod to penetrate
                  # the hui-image element's shadow DOM — without `$` the
                  # CSS only reaches the outer ha-card root and never
                  # touches the inner <img>.
                  card_mod:
                    style:
                      hui-image $: |
                        img {
                          object-fit: contain !important;
                          object-position: center !important;
                          background-color: transparent !important;
                        }
                        div {
                          background-size: contain !important;
                          background-repeat: no-repeat !important;
                          background-position: center !important;
                        }
              # Animated SVG replay (custom card). Mounts when the toggle
              # is ON. The card reads the picked-session sensor's legs,
              # state_samples, map_projection, and base_map_image_url
              # attributes to draw the trail over the base map in <=30s.
              - type: conditional
                conditions:
                  - entity: input_boolean.dreame_a2_mower_animate_session
                    state: "on"
                card:
                  type: custom:dreame-mower-replay-card
                  entity: sensor.dreame_a2_mower_picked_session

          # ───── Visible divider + per-session content (conditional) ─────
          - type: conditional
            conditions:
              - entity: select.dreame_a2_mower_work_log
                state_not: "(pick a session)"
            card:
              type: vertical-stack
              cards:
                - type: markdown
                  content: |
                    <hr style="border:0;border-top:3px solid var(--primary-color);margin:12px 0 0 0;"/>

                    ## 📊 Picked session — {{ states('sensor.dreame_a2_mower_picked_session') }}

                # 4-up detail cards
                - type: grid
                  columns: 4
                  square: false
                  cards:
                    - type: markdown
                      content: |
                        ### Identity & outcome
                        **Started**: {{ state_attr('sensor.dreame_a2_mower_picked_session','started_at') }}
                        **Ended**: {{ state_attr('sensor.dreame_a2_mower_picked_session','ended_at') }}
                        **Mowing time**: {{ state_attr('sensor.dreame_a2_mower_picked_session','duration_min') }} min (elapsed {{ state_attr('sensor.dreame_a2_mower_picked_session','elapsed_min') }} min)
                        **Mode**: {{ state_attr('sensor.dreame_a2_mower_picked_session','mode_label') }}
                        **Trigger**: {{ state_attr('sensor.dreame_a2_mower_picked_session','start_mode_label') }}
                        **Strategy**: {{ state_attr('sensor.dreame_a2_mower_picked_session','pre_type_label') }}
                        **Outcome**: {{ state_attr('sensor.dreame_a2_mower_picked_session','result_label') }} — {{ state_attr('sensor.dreame_a2_mower_picked_session','stop_reason_label') }}
                        **Completed**: {{ '✅' if state_attr('sensor.dreame_a2_mower_picked_session','completed') else '❌' }}
                    - type: markdown
                      content: |
                        ### Coverage & efficiency
                        **Area mowed**: {{ state_attr('sensor.dreame_a2_mower_picked_session','area_mowed_m2') }} m² of {{ state_attr('sensor.dreame_a2_mower_picked_session','map_area_m2') }} m²
                        **Coverage**: {{ '%.1f'|format(state_attr('sensor.dreame_a2_mower_picked_session','coverage_pct')) if state_attr('sensor.dreame_a2_mower_picked_session','coverage_pct') else '—' }} %
                        **Distance**: {{ '%.0f'|format(state_attr('sensor.dreame_a2_mower_picked_session','distance_m')) }} m
                        **Height**: {{ state_attr('sensor.dreame_a2_mower_picked_session','mowing_height_mm') }} mm
                        **Efficiency**: {{ state_attr('sensor.dreame_a2_mower_picked_session','mowing_efficiency_label') }}
                        **m²/min**: {{ '%.2f'|format(state_attr('sensor.dreame_a2_mower_picked_session','m2_per_min')) if state_attr('sensor.dreame_a2_mower_picked_session','m2_per_min') else '—' }}
                        **m²/% battery**: {{ '%.2f'|format(state_attr('sensor.dreame_a2_mower_picked_session','m2_per_pct')) if state_attr('sensor.dreame_a2_mower_picked_session','m2_per_pct') else '—' }}
                    - type: markdown
                      content: |
                        ### Energy & time breakdown
                        **Battery**: start {{ state_attr('sensor.dreame_a2_mower_picked_session','charge_at_start_pct') }}% / end {{ state_attr('sensor.dreame_a2_mower_picked_session','charge_at_end_pct') }}% (min {{ state_attr('sensor.dreame_a2_mower_picked_session','charge_min_pct') }}%)
                        **Charge consumed**: {{ state_attr('sensor.dreame_a2_mower_picked_session','charge_used_pct') }}% (recovered {{ state_attr('sensor.dreame_a2_mower_picked_session','charge_recovered_pct') }}% across {{ state_attr('sensor.dreame_a2_mower_picked_session','recharge_count') }} recharge(s))
                        **Time mowing**: {{ state_attr('sensor.dreame_a2_mower_picked_session','time_mowing_min') }} min
                        **Time charging**: {{ state_attr('sensor.dreame_a2_mower_picked_session','time_charging_min') }} min
                        **Rain protection delay**: {{ state_attr('sensor.dreame_a2_mower_picked_session','time_rain_protection_min') }} min
                        **Time other**: {{ state_attr('sensor.dreame_a2_mower_picked_session','time_other_min') }} min
                    - type: markdown
                      content: |
                        ### Diagnostics
                        **Faults**: {{ state_attr('sensor.dreame_a2_mower_picked_session','fault_count') }}
                        **Obstacles**: {{ state_attr('sensor.dreame_a2_mower_picked_session','obstacle_count') }} (AI {{ state_attr('sensor.dreame_a2_mower_picked_session','ai_obstacle_count') }})
                        **State transitions**: {{ state_attr('sensor.dreame_a2_mower_picked_session','state_transition_count') }}
                        **Error events**: {{ state_attr('sensor.dreame_a2_mower_picked_session','error_event_count') }} (codes {{ state_attr('sensor.dreame_a2_mower_picked_session','error_codes_seen') }})
                        **WiFi RSSI**: min {{ state_attr('sensor.dreame_a2_mower_picked_session','wifi_rssi_min_dbm') }} / avg {{ state_attr('sensor.dreame_a2_mower_picked_session','wifi_rssi_avg_dbm') }} / max {{ state_attr('sensor.dreame_a2_mower_picked_session','wifi_rssi_max_dbm') }} dBm ({{ state_attr('sensor.dreame_a2_mower_picked_session','wifi_sample_count') }} fingerprints)

                # Settings-snapshot card. `type: conditional` doesn't
                # support `condition: template`, so this is always
                # rendered with Jinja branching on the attribute
                # itself — pre-v1.0.13a1 archives lack the snapshot
                # and show a placeholder line instead.
                - type: markdown
                  content: |
                    ### Settings in effect at session start
                    {% set s = state_attr('sensor.dreame_a2_mower_picked_session','settings_snapshot') %}
                    {% if s %}
                    **EdgeMaster**: {{ s.get('settings_edgemaster') }}
                    **Edge walk mode**: {{ s.get('settings_edge_mowing_walk_mode') }}
                    **Edge mowing mode**: {{ s.get('settings_edge_mowing_mode') }}
                    **Obstacle avoidance**: {{ s.get('settings_obstacle_avoidance_mode') }} (AI: {{ s.get('settings_obstacle_avoidance_ai') }})
                    **Mowing height**: {{ s.get('settings_mowing_height_mm') }} mm
                    **Mowing efficiency**: {{ s.get('settings_mowing_efficiency') }}
                    {% else %}
                    _Not captured for this session — settings_snapshot was added in v1.0.13a1. Sessions starting from now will populate this._
                    {% endif %}

                # Charts row (Battery + WiFi side-by-side). Uses
                # plotly-graph-card — its $fn JS callbacks read the
                # entity's attributes directly and the datetime x-axis
                # auto-fits to the data's actual time extents, so the
                # x labels show the SESSION's real clock times instead
                # of the "shifted to now" workaround the apex cards
                # had to use. Replaces apexcharts-card here because
                # apex hardcoded xaxis.type:datetime + graph_span time-
                # window filtering, which kept clipping the data.
                - type: horizontal-stack
                  cards:
                    # v3.3.5 quirk: the card always injects
                    # xaxis.range = [now - hours_to_show, now] (see
                    # defaults.ts addPostParsingDefaults), and Plotly
                    # treats an explicit range as authoritative on
                    # first render, so layout.xaxis.autorange: true
                    # cannot defeat it. The supported escape is the
                    # top-level visible_range key, which when supplied
                    # as a $fn replaces that computed window. We
                    # derive [start, end] from the picked-session
                    # sample timestamps so the x-axis fits the data's
                    # real clock span.
                    # refresh_interval: omitted on purpose. The default
                    # "auto" is what wires the card's hass-setter path
                    # (plotly-graph-card.ts:208-247) to re-call plot()
                    # when the picked-session sensor's state changes —
                    # i.e. when the user picks a different session.
                    # refresh_interval: 0 disables that path; the graph
                    # then only updates on manual reload.
                    - type: custom:plotly-graph
                      title: Battery % over session
                      visible_range: |
                        $fn ({ hass }) => {
                          const a = hass.states['sensor.dreame_a2_mower_picked_session']?.attributes?.battery_samples || [];
                          if (!a.length) { const n = Date.now(); return [n - 3600e3, n]; }
                          const t0 = a[0][0] * 1000, t1 = a[a.length - 1][0] * 1000;
                          const pad = Math.max((t1 - t0) * 0.02, 30e3);
                          return [t0 - pad, t1 + pad];
                        }
                      entities:
                        - entity: sensor.dreame_a2_mower_picked_session
                          name: Battery %
                          show_value: false
                          line:
                            color: rgb(255, 140, 0)
                            width: 2
                          # Top-level x:/y: $fn injects trace data directly.
                          # Read via hass.states[...]?.attributes?.X — the
                          # `vars` binding's .attributes is sometimes
                          # undefined during the state-change re-render
                          # transient (sensor between "(pick a session)"
                          # and the new session id), which threw
                          # "cannot read properties of undefined (reading
                          # 'battery_samples')" and killed the trace.
                          #
                          # Gap-aware: between consecutive samples whose
                          # dt > 300 s (5 min), insert a midpoint x with
                          # y=null so plotly breaks the line (default
                          # connectgaps:false on scatter traces). Normal
                          # battery cadence is 30-90 s during charging
                          # or mowing; anything over 5 min is a real
                          # MQTT/cloud outage and the straight-line
                          # interpolation is misleading.
                          x: |
                            $fn ({ hass }) => {
                              const a = hass.states['sensor.dreame_a2_mower_picked_session']?.attributes?.battery_samples || [];
                              const xs = [];
                              for (let i = 0; i < a.length; i++) {
                                xs.push(new Date(a[i][0] * 1000));
                                if (i + 1 < a.length && a[i+1][0] - a[i][0] > 300) {
                                  xs.push(new Date((a[i][0] + a[i+1][0]) * 500));
                                }
                              }
                              return xs;
                            }
                          y: |
                            $fn ({ hass }) => {
                              const a = hass.states['sensor.dreame_a2_mower_picked_session']?.attributes?.battery_samples || [];
                              const ys = [];
                              for (let i = 0; i < a.length; i++) {
                                ys.push(a[i][1]);
                                if (i + 1 < a.length && a[i+1][0] - a[i][0] > 300) {
                                  ys.push(null);
                                }
                              }
                              return ys;
                            }
                      layout:
                        yaxis:
                          title:
                            text: Battery %
                          range: [0, 100]
                        margin:
                          l: 50
                          r: 30
                          t: 20
                          b: 50
                        height: 280
                    - type: custom:plotly-graph
                      title: WiFi RSSI over session
                      visible_range: |
                        $fn ({ hass }) => {
                          const a = hass.states['sensor.dreame_a2_mower_picked_session']?.attributes?.wifi_samples || [];
                          if (!a.length) { const n = Date.now(); return [n - 3600e3, n]; }
                          const t0 = a[0][3] * 1000, t1 = a[a.length - 1][3] * 1000;
                          const pad = Math.max((t1 - t0) * 0.02, 30e3);
                          return [t0 - pad, t1 + pad];
                        }
                      entities:
                        - entity: sensor.dreame_a2_mower_picked_session
                          name: RSSI (dBm)
                          show_value: false
                          line:
                            color: rgb(255, 140, 0)
                            width: 2
                          # Same gap-aware pattern as the battery
                          # trace. wifi_samples timestamp is index 3,
                          # rssi is index 2.
                          x: |
                            $fn ({ hass }) => {
                              const a = hass.states['sensor.dreame_a2_mower_picked_session']?.attributes?.wifi_samples || [];
                              const xs = [];
                              for (let i = 0; i < a.length; i++) {
                                xs.push(new Date(a[i][3] * 1000));
                                if (i + 1 < a.length && a[i+1][3] - a[i][3] > 300) {
                                  xs.push(new Date((a[i][3] + a[i+1][3]) * 500));
                                }
                              }
                              return xs;
                            }
                          y: |
                            $fn ({ hass }) => {
                              const a = hass.states['sensor.dreame_a2_mower_picked_session']?.attributes?.wifi_samples || [];
                              const ys = [];
                              for (let i = 0; i < a.length; i++) {
                                ys.push(a[i][2]);
                                if (i + 1 < a.length && a[i+1][3] - a[i][3] > 300) {
                                  ys.push(null);
                                }
                              }
                              return ys;
                            }
                      layout:
                        yaxis:
                          title:
                            text: RSSI (dBm)
                        margin:
                          l: 50
                          r: 30
                          t: 20
                          b: 50
                        height: 280

  - title: More Settings
    path: more-settings
    type: panel
    icon: mdi:cog
    cards:
      - type: vertical-stack
        cards:
          - *tab_header_more_settings

          # 3-column grid: all 12 settings cards in current order across 3 columns.
          # Paired markdown notes merged into preceding entities cards as footers.
          - type: grid
            columns: 3
            square: false
            cards:
              # ───── Consumables & Maintenance (read-only sensors) ─────
              # `entities` footer only supports buttons/graph/picture, so
              # the explanatory note sits in a vertical-stack sibling.
              - type: vertical-stack
                cards:
                  - type: entities
                    title: Consumables & Maintenance
                    show_header_toggle: false
                    entities:
                      - entity: sensor.dreame_a2_mower_blades_life
                        name: Blades
                      - entity: sensor.dreame_a2_mower_cleaning_brush_life
                        name: Cleaning brush
                      - entity: sensor.dreame_a2_mower_robot_maintenance_life
                        name: Robot maintenance
                  - type: markdown
                    content: |
                      _Reset buttons not yet exposed — see iobroker write-path tier reference for candidates._

              # ───── Work Management (existing card; kept in place after Consumables) ─────
              - type: entities
                title: Work Management
                show_header_toggle: false
                entities:
                  - entity: switch.dreame_a2_mower_ai_obstacle_photos
                    name: Capture photos of AI obstacles

              # ───── Rain Protection ─────
              - type: vertical-stack
                cards:
                  - type: entities
                    title: Rain Protection
                    show_header_toggle: false
                    entities:
                      - entity: switch.dreame_a2_mower_rain_protection
                        name: Enabled
                      - entity: select.dreame_a2_mower_rain_protection_resume_hours
                        name: Resume after
                      - entity: binary_sensor.dreame_a2_mower_rain_protection_active
                        name: Currently delayed
                  - type: markdown
                    content: |
                      _Ambient temperature not exposed; rain trigger source TBD._

              # ───── Frost Protection ─────
              - type: vertical-stack
                cards:
                  - type: entities
                    title: Frost Protection
                    show_header_toggle: false
                    entities:
                      - entity: switch.dreame_a2_mower_frost_protection
                        name: Enabled
                  - type: markdown
                    content: |
                      _Stops below 6 °C. Ambient temperature not exposed (possible candidate in unknown mqtt corpus)._

              # ───── Do Not Disturb / Nighttime ─────
              - type: vertical-stack
                cards:
                  - type: entities
                    title: Do Not Disturb / Nighttime
                    show_header_toggle: false
                    entities:
