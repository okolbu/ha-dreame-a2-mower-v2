# g2408 Protocol Inventory — source of truth.
#
# Edit this file by hand. Never edit the rendered docs in
# docs/research/inventory/generated/ — they are produced by
# `python tools/inventory_gen.py`.
#
# Schema documentation: docs/research/inventory/README.md
# Spec: docs/superpowers/specs/2026-05-05-g2408-protocol-inventory-design.md

_sources:
  apk_md: "github.com/TA2k/ioBroker.dreame/blob/main/apk.md"
  alt_repos:
    iobroker_dreame: "github.com/TA2k/ioBroker.dreame"
    dreame_mower: "github.com/antondaubert/dreame-mower"
    dreame_vacuum: "github.com/Tasshack/dreame-vacuum"
    dreame_mova_mower: "github.com/nicolasglg/dreame-mova-mower"
    legacy: "github.com/okolbu/ha-dreame-a2-mower-legacy"
  probe_log_corpus_glob: "../probe_log_*.jsonl"
  cloud_dump_corpus_glob: "../dreame_cloud_dumps/dump_*.json"

# Sections — each is a list of rows. Empty at bootstrap; populated
# by Tasks 8 onward.
properties:

  - id: "s1p1"
    siid: 1
    piid: 1
    name: "heartbeat"
    category: "blob"
    payload_shape: "20-byte blob"
    semantic: |
      Mower-alive ping sent every ~45 seconds regardless of state, plus extra
      emissions during state transitions. 0xCE delimiters at bytes [0] and [19].

      Key decoded bytes (partial — full catalog in heartbeat_bytes section, Task 9):
      - [1] & 0x02: Drop / Robot tilted
      - [1] & 0x01: Bumper hit (no corresponding s2p2 transition)
      - [2] & 0x02: Lift / Robot lifted
      - [3] & 0x80: Lift lockout / PIN required
      - [6] & 0x08: Charging paused — battery temperature too low
      - [10] & 0x80: Latched low-temp event flag (set since last power-cycle)
        — see 2026-05-30 corpus verification: NOT an off-dock flag (it is set
        ~93% of docked+warm samples too); a single-run off-dock hypothesis was
        refuted. Trigger still not cleanly pinned, but "mostly-set" is
        consistent with a since-power-cycle latch.
      - [10] & 0x02: One-shot active-alert flag (self-clears 30–90 s)
      - [17]: WiFi RSSI as signed byte (b if b<128 else b−256)

      Per-byte decode lives in the heartbeat_bytes section (Task 9).
      Confirmed 2026-04-17 through 2026-05-05 across the full probe corpus.
    status:
      seen_on_wire: true
      first_seen: "2026-04-17"
      last_seen: "2026-05-30"
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    references:
      integration_code: "custom_components/dreame_a2_mower/protocol/heartbeat.py"
      protocol_doc: "docs/research/inventory/generated/g2408-canonical.md § Heartbeat (s1p1) bytes"
      apk: "ioBroker.dreame/apk.md §MQTT Property Subscriptions SIID 1"
    verifications:
      - date: "2026-05-30"
        status: verified
        claim: |
          byte[4]&0x40 and byte[10]&0x80 are NOT off-dock flags. A single
          2026-05-30 maintenance-spot undock showed both bits flipping 0→1 at
          the undock second (with battery_temp_low=0), which looked like an
          off-dock marker — but a full-corpus cross-tab over all 9 probe logs
          (~66k heartbeats) refutes it:
            byte[10]&0x80 set-rate: docked+warm 92.7% (8926/9631),
              offdock+templow 100% (187/187), offdock+warm 64.6% (36150/55997)
            byte[4]&0x40 set-rate: docked+warm 8.1%, offdock+warm 5.5%,
              offdock+templow 0%
          byte[10]&0x80 is set almost always — including ON the dock — so it
          cannot mean "off-dock"; its mostly-set behaviour is consistent with
          the documented "latched-since-power-cycle low-temp" reading (a latch
          that, once set on the season's first cold night, stays set), though
          the trigger is not cleanly pinned. byte[4]&0x40 is mostly UNSET
          everywhere and slightly more common docked than off-dock, so it is
          not off-dock either. The single-run off-dock hypothesis was an
          unrepresentative ~7% sample; the original semantic labels stand.
        evidence: "_corpus.py cross-tab over probe_log_*.jsonl (9 logs, 2026-04-17..05-30); single-run trigger was probe_log_20260520_131350.jsonl @ 2026-05-30 15:17:40"

  - id: "s1p2"
    siid: 1
    piid: 2
    name: "ota_state"
    category: "property"
    payload_shape: "int (enum)"
    value_catalog:
      0: "UNDEFINED"
      1: "IDLE"
      2: "UPGRADING"
      3: "UPGRADE_SUCCESS"
      4: "UPGRADE_FAILED"
      5: "CANNOT_UPGRADE"
    semantic: |
      OTA firmware-update state. Apk-documented via OTAState enum (L57342):
      0=UNDEFINED, 1=IDLE, 2=UPGRADING, 3=UPGRADE_SUCCESS, 4=UPGRADE_FAILED,
      5=CANNOT_UPGRADE. Apk subscribes to this property at L181402-181404 and
      surfaces it in the OTA progress UI. Not observed in g2408 probe corpus
      (no firmware update was captured during the probe period).

      Expect to see transitions 1→2→3 (or 1→2→4) during the next OTA event.
      Should fire before/after s1p3 (OTA progress) pushes.
    status:
      seen_on_wire: false
      decoded: hypothesized
      bt_only: false
      not_on_g2408: false
    references:
      apk: "ioBroker.dreame/apk.md §MQTT Property Subscriptions SIID 1 piid:2"
    open_questions:
      - "Capture s1p2 transitions during the next firmware update to confirm value semantics."
      - "Does g2408 emit CANNOT_UPGRADE (5) when battery is too low for OTA?"

  - id: "s1p3"
    siid: 1
    piid: 3
    name: "ota_progress"
    category: "property"
    payload_shape: "int 0..100"
    unit:
      wire: "percent"
      display: "%"
      scale: 1.0
    semantic: |
      OTA firmware-update download/install progress counter, 0..100. Apk-
      documented at L181422-181424; surfaces as the progress bar in the
      OTA update UI. Not observed in g2408 probe corpus (no firmware update
      was captured during the probe period).

      Expected behaviour: pushes incrementally from 0 to 100 while s1p2 is
      UPGRADING (2). A jump to 100 followed by s1p2 → UPGRADE_SUCCESS (3)
      marks the completed update.
    status:
      seen_on_wire: false
      decoded: hypothesized
      bt_only: false
      not_on_g2408: false
    references:
      apk: "ioBroker.dreame/apk.md §MQTT Property Subscriptions SIID 1 piid:3"
    open_questions:
      - "Capture s1p3 during the next firmware update to confirm 0..100 range and cadence."

  - id: "s1p4"
    siid: 1
    piid: 4
    name: "mowing_telemetry"
    category: "blob"
    payload_shape: "33-byte / 8-byte / 10-byte variants"
    semantic: |
      Position, phase, area, and distance telemetry. Three frame lengths observed
      on g2408: 33-byte (full telemetry during active mowing), 8-byte (beacon
      variant during idle/docked, start-of-leg preamble, BUILDING sessions, and
      post-FTRTS dock-navigation), 10-byte (one per BUILDING session at zone-save
      moment).

      All variants share 0xCE delimiters and a common X/Y position at bytes [1-5]
      (20-bit signed packed decode, both axes in map-scale mm). X-axis confirmed
      via fixture; Y-axis decode corrected in alpha.98 (prior code had a 16× Y
      overshoot compensated by scattered 0.625 factors, all removed).

      The 33-byte frame additionally carries: sequence (bytes [6-7]), phase_raw
      (byte [8] — index into firmware's per-zone task plan, NOT a mowing/transit
      enum), motion vectors / path history (bytes [10-21]), distance_deci
      (bytes [24-25], ÷10 → m), total_area_cent (bytes [26-27], ÷100 → m²),
      area_mowed_cent (bytes [29-30], ÷100 → m²). area_mowed_cent advancing while
      position is stationary is the blades-on detector.

      Per-byte decode lives in telemetry_fields and telemetry_variants sections
      (Task 10). Confirmed 2026-04-17 through 2026-05-05.
    status:
      seen_on_wire: true
      first_seen: "2026-04-17"
      last_seen: "2026-05-05"
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    references:
      integration_code: "custom_components/dreame_a2_mower/protocol/telemetry.py"
      protocol_doc: "docs/research/inventory/generated/g2408-canonical.md § Telemetry (s1p4) fields"
      apk: "ioBroker.dreame/apk.md §MQTT Property Subscriptions SIID 1 piid:4"

  - id: "s1p50"
    siid: 1
    piid: 50
    name: "state_change_ping"
    category: "trigger"
    payload_shape: "empty_dict"
    semantic: |
      Lightweight "something changed, consider re-fetching" ping. No payload.
      Fires at session start (paired with s1p51), at BUILDING zone-save (multiple
      pulses in the same second), at zone/exclusion edits (paired with s2p50
      o=215), at maintenance-point save (two pulses 1 s apart), AND at
      every map-swap (one pulse per swap, 2026-05-07 confirmed across
      multiple swaps in a single session).

      A standalone s1p50 (no s1p51, no s2p50) is the signal to re-fetch whatever
      the integration caches from the cloud — in practice, the MAP.* dataset
      and/or MAPL for active-map detection. Map-swap pulses are the most
      reliable per-swap signal (s2p50 o:200 is conditional — fires on
      some swaps but not others; see o200 entry).

      See docs/research/inventory/generated/g2408-canonical.md § Routed-action opcodes for the full role catalogue and
      the correction note (2026-04-23) on earlier session-boundary hypotheses.
    status:
      seen_on_wire: true
      first_seen: "2026-04-17"
      last_seen: "2026-05-07"
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    references:
      integration_code: "coordinator/ (see _property_apply.py § _SUPPRESSED_SLOTS + _mqtt_handlers.py § handle_property_push)"
      protocol_doc: "docs/research/inventory/generated/g2408-canonical.md § Routed-action opcodes"
      apk: "ioBroker.dreame/apk.md §MQTT Property Subscriptions SIID 1 piid:50"
    verifications:
      - date: "2026-05-30"
        status: verified
        claim: |
          s1p50 + s1p51 ALWAYS co-fire (never one without the other) and mark
          the END of the post-undock reorient / start of traversal. Corpus-wide
          undock-bracket analysis (_reorient.py over all 9 probe logs, 66
          undocks defined as s2p1 mode 6→mobile):
            - s1p50 present in 61/66, s1p51 present in 61/66, identical offsets,
              median +41 s after undock (range +37..+46 s).
            - immediately followed by s2p56→[[task,_]] (task-active) at +42 s
              (61/66) and the first s1p4 33-byte movement frame at +45 s
              (61/66, range +38..+49 s).
            - between undock and that +41 s point there is a consistent
              ~38–49 s s1p4 telemetry SILENCE (median 45 s) — only s1p1
              heartbeats — which is the housekeeping + 360° relocate ("the
              mower backs out and spins for LiDAR bearings"; app shows a
              "Reorienting → Repositioning Successful → Mowing started" popup
              over this window). No dedicated wire code marks the reorient
              START beyond the undock transition itself; s1p50/s1p51 mark its
              END. The 5/66 undocks missing s1p50/s1p51 did not proceed to a
              normal mow (aborted / failed relocate — the one s2p65
              TASK_SLAM_RELOCATE in the corpus is among these).
          Corrects a single-run guess that "s2p56 going empty {status:[]} then
          [[2,0]] while working" brackets the reorient — that empty-then-active
          pattern held in only 2/66 undocks; s2p56 simply goes active at +42 s.
        evidence: "_reorient.py corpus bracket over probe_log_*.jsonl (9 logs, 66 undocks, 2026-04-17..05-30)"
    open_questions:
      - "The app's 'Reorienting' popup is NOT driven by the MQTT /status/ stream. A clean popup-timed capture 2026-05-30 (move @ 17:25): user-noted popup START 17:25:42, STOP 17:26:17 — BOTH land inside the 41 s MQTT-silent reorient window (undock 17:25:37-38 → s1p50/s1p51 17:26:19), i.e. popup START ≈ undock+5 s, popup STOP ≈ s1p50/s1p51−2 s. The only wire traffic at those two instants is a routine s1p1 heartbeat whose 20 bytes are identical to neighbours except the counter (byte[11-12]) and a non-binary byte[14] (0 docked→64 undock→4→5→7→135) — NO clean popup on/off flag. So the popup driver is off the sniffed wire (cloud poll/push suspected); the integration cannot reproduce its exact timing from MQTT — best proxy is the bracket [undock transition → s1p50/s1p51]. LEAD for a future capture: popup START and STOP each coincided with an s1p1 emission (s1p1 fires extra heartbeats on state transitions) — check whether popup edges ALWAYS coincide with a heartbeat across captures before trusting it."
      - "Housekeeping slots seen DURING the silence (candidates for what the firmware does while it spins): s6p1 map_data_signal {200,201,300} at ~+20 s (5/66; likely the LiDAR-map load), s5p107 energy_index at ~+13 s (53/66), and the UNDER-DECODED s5p106 (purpose unknown, values 1-8; 7/66 at ~+12 s) and s5p105 (enum {1,2,4}; 3/66 at ~+13 s). The clean 360 relocate does NOT emit the SLAM counter (s5p104/s2p65 fire only on the failed-relocate case, 1/66)."
    runtime:
      suppress: true
      suppress_reason: "Session-boundary 'something changed, consider re-fetching' ping; payload is empty dict; no field to track."

  - id: "s1p51"
    siid: 1
    piid: 51
    name: "dock_position_update_trigger"
    category: "trigger"
    payload_shape: "empty_dict"
    semantic: |
      Dock-position-update trigger per apk decompilation. Fires when the dock pose
      changes; consumer should re-fetch via the routed getDockPos action (siid:2
      aiid:50 m:'g' t:'DOCK'). Also fires co-incident with s1p50 at every mowing
      session start (the firmware emits both in the same second when a run begins),
      but the primary semantic is dock-pose change, not session boundary.

      2026-04-23 correction: earlier hypothesis called this a "session-start
      companion to s1p50 based on observed co-occurrence". Co-occurrence is real
      but the apk specifies dock-pose change as the primary trigger.
    status:
      seen_on_wire: true
      first_seen: "2026-04-17"
      last_seen: "2026-05-05"
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    references:
      integration_code: "coordinator/ (see _property_apply.py § _SUPPRESSED_SLOTS + _mqtt_handlers.py § handle_property_push)"
      protocol_doc: "docs/research/inventory/generated/g2408-canonical.md § Routed-action opcodes"
      apk: "ioBroker.dreame/apk.md §MQTT Property Subscriptions SIID 1 piid:51"
    runtime:
      suppress: true
      suppress_reason: "Dock-position-update trigger; payload is empty dict; consumer re-fetches via getDockPos action."

  - id: "s1p52"
    siid: 1
    piid: 52
    name: "task_end_flush"
    category: "trigger"
    payload_shape: "empty_dict"
    semantic: |
      Task-ended flush/commit ping. No payload. Fires at session complete
      (s2p2 = 48) on both natural end (12:33:09 on 2026-04-20) and user-cancel
      (18:06:19). Does not fire at BUILDING end. Also fires immediately before
      the cloud event_occured siid=4 eiid=1 session-summary push (2026-04-22
      16:35:17).

      2026-04-23 correction: the earlier "s1p52 + s2p52 bracket session ends"
      hypothesis is wrong per apk decompilation. s2p52's primary semantic is
      mowing-preference-update trigger, not session-end. The apparent co-occurrence
      at session boundaries is firmware bookkeeping (re-emitting prefs as part of
      teardown).
    status:
      seen_on_wire: true
      first_seen: "2026-04-17"
      last_seen: "2026-05-05"
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    references:
      integration_code: "coordinator/ (see _property_apply.py § _SUPPRESSED_SLOTS + _mqtt_handlers.py § handle_property_push)"
      protocol_doc: "docs/research/inventory/generated/g2408-canonical.md § Routed-action opcodes"
      apk: "ioBroker.dreame/apk.md §MQTT Property Subscriptions SIID 1 piid:52"
    runtime:
      suppress: true
      suppress_reason: "End-of-task flush ping; payload is empty dict; session-end is detected via s2p2/s2p1 transitions, not this slot."

  - id: "s1p53"
    siid: 1
    piid: 53
    name: "obstacle_flag"
    category: "property"
    payload_shape: "bool"
    semantic: |
      Set True when the mower detects an obstacle, person, or animal during mowing.
      Never sent False automatically — the HA entity must auto-clear after ~30 s
      of no refresh, otherwise it latches indefinitely.

      Apk names this slot "BLE Connection Status" but g2408 behaviour is
      obstacle-detection: 26 triggers observed in ~15 min near an exclusion zone,
      mean duration ~6.6 s. Cleared to False at 21:04:46 on 2026-04-18 as a
      side-effect of a state transition, not by an obstacle-clear event.

      Separate from human-presence detection, which goes through the Dreame cloud
      push-notification service directly and is not observable via MQTT.

      Note: apk name "BLE Connection Status" does not match g2408 wire behaviour.
    status:
      seen_on_wire: true
      first_seen: "2026-04-17"
      last_seen: "2026-05-05"
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    references:
      integration_code: "custom_components/dreame_a2_mower/mower/property_mapping.py:61"
      protocol_doc: "docs/research/inventory/generated/g2408-canonical.md § Heartbeat (s1p1) bytes"
      apk: "ioBroker.dreame/apk.md §MQTT Property Subscriptions SIID 1 piid:53"

  - id: "s2p1"
    siid: 2
    piid: 1
    name: "mode"
    category: "property"
    payload_shape: "int (enum)"
    value_catalog:
      1: "Mowing"
      2: "Idle"
      3: "Paused"
      4: "Paused"
      5: "Returning"
      6: "Charging"
      11: "Building"
      13: "Charging Completed"
      14: "Updating"
      16: "Battery Temp Hold"
    semantic: |
      Mower mode/activity enum per apk decompilation. Previously hypothesized as
      a mystery enum {1, 2, 5}; apk reveals the full mapping. Note the upstream
      dreame-mova-mower mapping swaps (2,1) and (2,2) vs g2408 actual — the g2408
      overlay in types.py swaps them back.

      Value 16 is labelled STATION_RESET in the legacy upstream enum (still used in
      lawn_mower.py for now); the actual semantics are "docked, refusing to charge
      because battery is below safe-charge temperature" — confirmed 2026-04-26
      across 5 occurrences during cold morning hours, every entry coincident with
      s1p1 byte[6]=0x08.

      Value 3 (PAUSED) confirmed in probe corpus: 5 observations in two files
      (2026-04-17 and 2026-04-22/28/29), always co-incident with s2p56
      status=[[1,4]]. Previously thought to fold into mode 1.

      Value 11 (BUILDING) confirmed 2026-04-20 17:00:09 when user triggered
      "Expand Lawn" from the Dreame app.
    status:
      seen_on_wire: true
      first_seen: "2026-04-17"
      last_seen: "2026-05-25"
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    references:
      integration_code: "custom_components/dreame_a2_mower/mower/property_mapping.py:56"
      protocol_doc: "docs/research/inventory/generated/g2408-canonical.md § s2p1 mode enum"
      apk: "ioBroker.dreame/apk.md §MQTT Property Subscriptions SIID 2 piid:1"
    verifications:
      - date: "2026-05-25"
        status: partial
        claim: |
          s2p1=4 observed for the first time in the probe corpus at
          2026-05-25 12:32:27 (end of the failed off-dock start). It is NOT
          "ERROR": the authoritative Dreame mower app asset
          (assets/flutter_assets/assets/home_device/common_mower_protocol.json
          in com.dreame.smartlife 2.5.6.4) defines keyDefine "2.1" value 4 =
          "Paused" (en) / 暂停 (zh), and this enum has NO error member at all.
          Behaviour matches a pause/hold, not a fault: the mower sat in 4 for
          exactly one hour (heartbeat-only) then auto-resumed to 1 (Mowing) at
          13:32:25 — an error would need intervention. The probe analyzer's
          4=ERROR is a vacuum-inherited mislabel (probe_a2_analyze.py
          ENUM_DECODERS (2,1)). Caveat: that app table is internally
          inconsistent for value 3 (en "Working" vs zh 暂停), so the 3-vs-4
          split is not crisp — both render as 暂停 in Chinese. Added 4="Paused"
          to value_catalog on that basis.
        evidence: "apks/com.dreame.smartlife_2.5.6.4 base.apk → assets/flutter_assets/assets/home_device/common_mower_protocol.json (keyDefine 2.1); probe_log_20260520_131350.jsonl @ 2026-05-25 12:32:27→13:32:25"
      - date: "2026-05-25"
        status: verified
        claim: |
          The s2p2 fault-code → notification-text mapping is cloud-composed,
          not local — this is why s2p2 has resisted a month of probe logs.
          The current Flutter app (2.5.6.4) carries only the STATE enum (2.1)
          in common_mower_protocol.json; there is NO fault (2.2) table in any
          flutter_asset, and libapp.so (Dart AOT) contains none of the
          FaultIndex enum names (HANGING/EMERGENCY_STOP/...) nor the push texts
          ("Blades are severely worn", "Scheduled task cancelled", "positioning
          failed"). The wire carries only the numeric s2p2 code; Dreame's cloud
          selects and localises the words. The ioBroker apk.md FaultIndex came
          from an OLDER React-Native build (index.android.bundle), which none of
          the local apks/ contain (1.5.41 and 2.1.0.14 have no bundle; 2.5.x is
          Flutter). So naming s2p2 20/33/36 needs either that RN-era apk's full
          78-entry FaultIndex or empirical code↔push correlation across
          incidents — NOT derivable from wire + current app alone.
        evidence: "apks/com.dreame.smartlife_2.5.6.4 (Flutter; flutter_assets has only 2.1 in common_mower_protocol.json; libapp.so strings lack FaultIndex names and push texts); apks/Dreamehome 1.5.41 & 2.1.0.14 (no index.android.bundle)"

  - id: "s2p2"
    siid: 2
    piid: 2
    name: "error_code"
    category: "property"
    payload_shape: "int (state/error code)"
    semantic: |
      State and error code per apk decompilation. Previously misread as a state
      machine with values {27, 43, 48, ...}; apk reveals it carries fault indices
      catalogued in apk FaultIndex (e.g. 0=HANGING, 24=BATTERY_LOW, 27=HUMAN_DETECTED,
      56=BAD_WEATHER, 73=TOP_COVER_OPEN).

      Key values observed on g2408: 27=idle, 31=Failed to return to station,
      33=Failure transition, 43=Battery temperature low charging stopped,
      48=Mowing complete, 50=Manual session start, 53=Scheduled session start,
      54=Returning, 56=Rain protection activated, 60=Frost-protection-suppressed,
      70=Mowing, 71=Positioning failed, 75=Arrived at Maintenance Point,
      76=Cannot reach the maintenance point — task ended (give-up + return).

      See state_codes section for full value table (Task 12). Anything outside the
      known set produces a one-shot [PROTOCOL_NOVEL] s2p2 WARNING.

      Note: upstream dreame-mova-mower mapping treats (2,2) as ERROR and (2,1) as
      STATE — reversed vs g2408. The g2408 overlay corrects this.
    status:
      seen_on_wire: true
      first_seen: "2026-04-17"
      last_seen: "2026-05-30"
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    references:
      integration_code: "custom_components/dreame_a2_mower/mower/property_mapping.py:62"
      protocol_doc: "docs/research/inventory/generated/g2408-canonical.md § s2p2 state codes"
      apk: "ioBroker.dreame/apk.md §MQTT Property Subscriptions SIID 2 piid:2"
    verifications:
      - date: "2026-05-15"
        status: verified
        claim: |
          s2p2=56 is a one-shot transition code that fires once when rain is
          first detected on the LiDAR camera. The mower then transitions away
          (typically through 54=Returning, then dock idle). The "rain
          protection ACTIVE" state visible in the Dreame app is NOT carried by
          s2p2 continuously — the app derives it from the s2p2=56 timestamp
          plus WRP[1] resume_hours and clears it when the user presses
          Continue. binary_sensor.rain_protection_active now reads
