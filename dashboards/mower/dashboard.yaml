          - entity: switch.dreame_a2_mower_led_while_charging
          - entity: switch.dreame_a2_mower_led_on_error
          - entity: switch.dreame_a2_mower_led_period

  - title: Schedule
    path: schedule
    icon: mdi:calendar-clock
    cards:
      - type: entities
        title: Schedule slots (cloud)
        show_header_toggle: false
        entities:
          - entity: sensor.dreame_a2_mower_schedule_count
            name: Slots configured
      - type: custom:dreame-a2-schedule-card
        sensor: sensor.dreame_a2_mower_schedule_count

  - title: LiDAR
    path: lidar
    icon: mdi:cube-scan
    cards:
      - type: custom:dreame-a2-lidar-card
        url: /api/dreame_a2_mower/lidar/latest.pcd
        show_map: true
        map_entity: camera.dreame_a2_mower_map
      - type: markdown
        content: |
          The card supports drag-to-orbit, wheel-to-zoom, and a slider
          for splat size. Tap the **⛶** button (top-right) for an
          interactive fullscreen view; ESC, the **×** button, or a
          backdrop click dismisses. The **↺** button restores the
          default camera angle if you've orbited into a confusing pose.

          Splat size, soft-edge toggle, map underlay (incl. Z and flip),
          and the camera viewpoint all persist across dashboard reloads.

          The `dreame_a2_mower.show_lidar_fullscreen` service opens the
          fullscreen overlay too — useful from automations or scripts.
      - type: entities
        title: Latest scans
        entities:
          - entity: sensor.dreame_a2_mower_lidar_archive_count
            name: Archived scans
      - type: conditional
        conditions:
          - entity: camera.dreame_a2_mower_lidar_top_down
            state_not: unavailable
        card:
          type: picture-entity
          entity: camera.dreame_a2_mower_lidar_top_down
          name: LIDAR top-down (latest)
          camera_view: auto
          show_state: false
      - type: conditional
        conditions:
          - entity: camera.dreame_a2_mower_lidar_full_resolution
            state_not: unavailable
        card:
          type: picture-entity
          entity: camera.dreame_a2_mower_lidar_full_resolution
          name: LIDAR full resolution (latest)
          camera_view: auto
          show_state: false

  - title: Work Logs
    path: work_logs
    icon: mdi:history
    cards:
      # Work Log map — picture-entity bound to the dedicated work_log
      # camera (camera.dreame_a2_mower_work_log). Independent of the
      # Mower-tab live Main view — periodic refreshes never overwrite
      # this slot. Picking a session in the select below renders that
      # session's archived trail into _work_log_png; picking the
      # placeholder falls back to the active map's static base so the
      # card always shows something useful (never a broken image).
      #
      # camera_view: auto — the underlying camera serves a static PNG
      # via /api/camera_proxy/ (single still). camera_view: live would
      # try to use /api/camera_proxy_stream/ (MJPEG), which our static-
      # PNG camera doesn't support — that's the bug behind the broken
      # image after picking. The popout uses the still endpoint and
      # works regardless of this setting; "auto" makes the card match.
      - type: picture-entity
        entity: camera.dreame_a2_mower_work_log
        name: Work Log
        camera_view: auto
        show_state: false
        # No aspect_ratio — the work_log camera renders against any of
        # the user's maps (the picked session's source map), and Map 1
        # vs Map 2 may have different native proportions. picture-entity
        # crops to fill when aspect_ratio is set, so a fixed ratio here
        # would clip the image whenever the picked session is on a map
        # whose dimensions don't match. Letting the card use the image's
        # native aspect means full picture is always visible (card
        # height will vary slightly between maps).
      - type: markdown
        content: |
          Pick a finalised session below to render its mowed track.
          The work log stays visible until you pick a different session
          or the placeholder. In-progress sessions are NOT shown here —
          the Mower-tab Main view shows the live mow in real time.

          Sessions tagged **⚠ (partial trail)** had a Home Assistant
          restart during the mow — the cloud trajectory is still complete
          but the local live-trail capture is short.
      - type: entities
        title: Latest session
        entities:
          - entity: sensor.dreame_a2_mower_latest_session_area
          - entity: sensor.dreame_a2_mower_latest_session_duration
          - entity: sensor.dreame_a2_mower_latest_session_time
      - type: entities
        title: Archive
        entities:
          - entity: sensor.dreame_a2_mower_archived_session_count
          - entity: select.dreame_a2_mower_work_log
      - type: horizontal-stack
        cards:
          - type: button
            name: Finalize stuck session
            tap_action:
              action: call-service
              service: dreame_a2_mower.finalize_session
          - type: markdown
            content: |
              Use **Finalize stuck session** if a mowing session has
              stopped on the mower but the integration is still showing
              "fetching summary" for more than 30 minutes.

  - title: Maps
    path: maps
    icon: mdi:map-multiple
    cards:
      - type: markdown
        content: |
          ## All known maps
          One static snapshot per map known to the integration. The
          live trail follows the active map (selectable on the Mower
          tab); these snapshots are read-only inventory.

          Per-map cameras only register at HA boot — restart HA after
          creating a new map in the Dreame app.
      # Per-map cameras: registered at HA boot when the cloud's
      # MAPL surface lists a map. New maps require an HA restart to
      # appear here. Wrapped in conditionals so the card hides when
      # a numbered slot is empty.
      - type: conditional
        conditions:
          - entity: camera.dreame_a2_mower_map_1
            state_not: unavailable
        card:
          type: picture-entity
          entity: camera.dreame_a2_mower_map_1
          name: Map 1
          camera_view: live
          show_state: false
          aspect_ratio: 637x717
      - type: conditional
        conditions:
          - entity: camera.dreame_a2_mower_map_2
            state_not: unavailable
        card:
          type: picture-entity
          entity: camera.dreame_a2_mower_map_2
          name: Map 2
          camera_view: live
          show_state: false
          aspect_ratio: 637x717

  - title: Tools
    path: tools
    icon: mdi:tools
    cards:
      - type: markdown
        content: |
          ## ⛔ DANGER — Lock robot

          **Pressing `Lock robot` once on 2026-05-09 wedged the
          integration's cloud RPC tunnel for ~30 minutes.** All
          fetch_* paths returned None right after the press; recovery
          required a config-entry reload. The mower LED did NOT change
          state (no visible effect). CFG.CLS stayed unchanged (so it's
          distinct from CHILD_LOCK).

          **Do not press `Lock robot` again until op=12 has been
          probed via a standalone cloud_client script** so we can
          capture the cloud's raw response and pin down what it does.
          See `docs/TODO.md` "ioBroker Tier 4" + auto-memory
          `project_lock_robot_op12_incident.md`.

          The other two buttons here (Generate 3D map, Request WiFi
          map) are untested but lower-risk: they target different
          surfaces (op=10 with `d:{idx:0}` for 3D map, direct MIoT
          s6.aiid=4 for WiFi map). Press only when docked.
      - type: entities
        title: New ioBroker actions (untested)
        entities:
          - entity: button.dreame_a2_mower_lock_robot
            name: ⛔ Lock robot (op=12) — DANGEROUS, see warning above
            icon: mdi:alert-octagon
          - entity: button.dreame_a2_mower_generate_3d_map
            name: Generate 3D map (op=10) — untested
          - entity: button.dreame_a2_mower_request_wifi_map
            name: Request WiFi map (s6.aiid=4) — untested
      - type: entities
        title: Diagnostics
        entities:
          - entity: button.dreame_a2_mower_refresh_from_cloud
            name: Force cloud refresh
          - entity: button.dreame_a2_mower_finalize_session
            name: Finalize stuck session

  - title: Diagnostics
    path: diagnostics
    icon: mdi:wrench-cog-outline
    cards:
      - type: entities
        title: Novel observations
        entities:
          - entity: sensor.dreame_a2_mower_novel_observations
      - type: markdown
        content: |
          `sensor.dreame_a2_mower_data_freshness` and
          `sensor.dreame_a2_mower_api_endpoints_supported` are
          default-disabled. Enable them in Settings → Devices &
          Services → Dreame A2 Mower → Entities to surface them
          on this dashboard.
      - type: entities
        title: Data freshness
        entities:
          - entity: sensor.dreame_a2_mower_data_freshness
          - entity: sensor.dreame_a2_mower_api_endpoints_supported
          - entity: sensor.dreame_a2_mower_last_settings_change
      - type: entities
        title: Archive counts
        entities:
          - entity: sensor.dreame_a2_mower_archived_session_count
          - entity: sensor.dreame_a2_mower_lidar_archive_count
      - type: entities
        title: Mower internals
        entities:
          - entity: sensor.dreame_a2_mower_mowing_phase
          - entity: sensor.dreame_a2_mower_task_state
          - entity: sensor.dreame_a2_mower_slam_task
          - entity: sensor.dreame_a2_mower_session_track_point_count
          - entity: binary_sensor.dreame_a2_mower_mowing_session_active
          - entity: binary_sensor.dreame_a2_mower_dock_inside_lawn_region
          - entity: binary_sensor.dreame_a2_mower_edgemaster
          - entity: binary_sensor.dreame_a2_mower_replay_loading
