  - id: "s2p56"
    siid: 2
    piid: 56
    name: "task_state"
    category: "property"
    payload_shape: "{status: list of [task_type, ...] tuples}"
    semantic: |
      Cloud status push — internal task-state ack. Wire envelope has two
      observed shapes on g2408:

        2-element variant — full-area mows (most common, 163/213 in corpus):
          {"status": []}            no active task
          {"status": [[1, 0]]}      running
          {"status": [[1, 2]]}      complete / transitional
          {"status": [[1, 4]]}      paused-pending-resume / recharge boundary

        3-element variant — SCHEDULED mows (since 2026-04-27); a value is inserted
        in the MIDDLE so the stage moves to the LAST element. So the structure is
        [task_id, X, stage] where X is always 0 (undecoded — likely a segment/lap
        index) and the STAGE is the LAST element (decoded 2026-05-30):
          {"status": [[1, 0, 0]]}   segment start (running) — last value 0
          {"status": [[1, 0, 2]]}   segment DONE — last value 2; fires 0 s before
                                    s2p56 goes empty (10/10 corpus sessions)
        IMPORTANT — segment vs archive session: [1,0,2] marks the end of the s2p56
        TASK SEGMENT, NOT necessarily the archive session. A rain-paused mow resumes
        as a NEW s2p56 segment after the break, and the archive session spans both
        (the 2026-05-09 19:00 edge mow: [1,0,2] at 19:13 ended segment 1, then rain,
        then it ran 19 h more across further segments). This reconciles the old
        "[1,0,2] is not a session-end" claim with "[1,0,2] = done": both true at
        different levels. The archive boundary correctly uses the empty `[]` /
        cloud-summary gate (which spans rain), NOT [1,0,2].
        NB the earlier "3-element = edge/spot/zone mows" attribution is imprecise:
        3-element correlates with SCHEDULED runs (morning all-area mode=100 included),
        not mow type. App-triggered runs (points, manual, the 2-spot mow) stay 2-element.
        CAVEAT for code: the integration reads status[0][1] as task_state_code — for
        2-element that's the stage (= last element, correct), but for 3-element that's
        the constant-0 MIDDLE, so the segment-done is invisible there. Harmless today
        (archive boundary uses empty/cloud), but a status[0][-1] read would be more
        correct at segment level (don't treat [1,0,2] as archive-session-end — that
        was the 2026-05-16 retraction's mistake).

      The integration extracts status[0][1] (the sub-state int) as
      task_state_code: 0=running, 4=paused, 2=complete, None=no task.

      For the 3-element variant the [1] read returns the middle 0, so
      task_state_code stays at 0 across the [1,0,0] → [1,0,2] transition.
      This is the correct behaviour: a rain-paused edge mow (2026-05-09 19:00
      ran 19h with two rain breaks) emits [1,0,2] partway through and keeps
      mowing afterwards. The authoritative session-end signal in the 3-element
      case is the next empty status `[]` event OR the integration's cloud-
      summary gate firing — whichever lands first. The probe sometimes misses
      the `[]` event (HA restart, probe truncation) in which case the HA
      archive's recorded `start` / `end` fields are the ground truth.

      The session-state machine uses task_state_code for begin_session /
      begin_leg / session-end transitions: 0→4→0 is a recharge round-trip;
      4→0 triggers begin_leg; prev∈{0,4} and new∈{2,None} means session ended.

      Confirmed g2408 sub-state values from 2026-04-29/30 corpus. Note: wire shape
      is a dict, not a bare int — a common decode trap for apk-decompiled code.
    status:
      seen_on_wire: true
      first_seen: "2026-04-17"
      last_seen: "2026-05-16"
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    verifications:
      - date: "2026-05-30"
        status: verified
        claim: |
          status is a LIST with ONE ENTRY PER QUEUED TARGET, not a single task.
          Live 2-spot mow (app-triggered, 2 of 3 spots): 21:18:32 status=[[1,0],[2,-1]]
          (spot id 1 running stage 0, spot id 2 queued stage -1) → 21:25:43
          [[1,2],[2,0]] (spot 1 done stage 2, spot 2 now running) → 21:30:40
          [[1,2],[2,2]] (both done) → one s2p2=48 for the whole command. So:
          (a) the first element of each entry = a STABLE per-target id (the selector
          — which point/spot/zone/edge; confirmed for points 2026-05-30: ids
          2,1,1,2 across the four point runs); (b) stage adds value -1 = QUEUED
          (new), alongside 0=running/2=done; (c) the list advances in-place (entries
          persist, stages tick), so target_ids = [e[0] for e in status] and
          per-target progress are readable from any push; (d) per-target completion
          in a multi-target run is the stage→2, NOT an s2p2 code (no s2p2 fired
          between the two spots). One app command can queue multiple items run in
          order.
        evidence: "probe_log_20260520_131350.jsonl @ 2026-05-30 21:18:32→21:30:40 (2-spot mow); point-run task_ids 2,1,1,2 @ 15:18/16:50/16:59/17:26"
      - date: "2026-05-16"
        status: verified
        claim: |
          3-element variant {"status": [[1, 0, 2]]} is NOT a session-end signal
          on its own. Documented at first sighting as "complete" but the
          2026-05-09 19:00 scheduled edge mow emitted [1,0,2] at 19:13 and then
          continued mowing for ~19 more hours (two 4-hour rain-protection
          delays). The true session-end is signalled later by an empty status
          `[]` event or by the integration's cloud-summary gate.
        evidence: "/data/claude/homeassistant/probe_log_20260514_211550.jsonl@2026-05-09 19:00:46→2026-05-10 14:11:55 + user confirmation"
      - date: "2026-05-16"
        status: retracted
        claim: |
          tried treating status[0][-1] as the unified sub_state extractor in
          tools/rebuild_session.py
        retracts: "sub_state is the LAST element, status[0][-1] cross-format"
        reason: |
          Hypothesis fit the 13-min 2026-05-16 19:00 case but broke the 19-hour
          2026-05-09 19:00 case (rain-paused edge mow). Reverted. The rebuild
          tool now falls back to the HA archive's start/end fields when no
          probe-detected window matches the requested --session-start.
    references:
      integration_code: "custom_components/dreame_a2_mower/mower/property_mapping.py:80"
      protocol_doc: "docs/research/inventory/generated/g2408-canonical.md § Properties"
      apk: "ioBroker.dreame/apk.md §MQTT Property Subscriptions SIID 2 piid:56"
    open_questions:
      - "3-element MIDDLE value (the X in [task_id, X, stage]) is always 0 in the corpus — undecoded. Likely a segment/lap index; capture a multi-segment scheduled run (e.g. a rain-paused mow's later segments) to see if it ever increments. (The THIRD/last value = stage 0=start/2=done is now decoded — 2026-05-30.)"
      - "Confirm the 3-element variant is SCHEDULED-correlated, not mow-type-correlated: cross-reference each 3-element session against its summary.mode (a 2026-05-30 spot-check found a morning mode=100 all-area scheduled mow that was 3-element, contradicting the old edge/spot/zone attribution). Needs a full per-session correlation."
