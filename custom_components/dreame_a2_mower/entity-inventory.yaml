    platform: switch
    class: "(removed 2026-05-15)"
    device: parent
    status:
      seen_working: false
      last_verified: "2026-05-15"
    verifications:
      - date: "2026-05-15"
        status: retracted
        retracts: "parent-level read-only EdgeMaster mirror tracking the last active map's value"
        reason: "Removed 2026-05-15. Was misleading on a multi-map device — surfaced only the most-recently-active map's s6p2[2] value. The per-map switch (switch.dreame_a2_mower_map_N_edgemaster) is the correct surface. v1.0.11a5 drops the descriptor from switch.py's SWITCHES tuple; cleanup script handles the registry orphan."
    notes: |
      Removed in v1.0.11a5. The per-map switch (id
      "switch.dreame_a2_mower_map_N_edgemaster") is the only EdgeMaster
      surface going forward.

