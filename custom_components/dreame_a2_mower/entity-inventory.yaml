        evidence: "tests/protocol/test_session_card.py::test_picked_session_summary_exposes_{legs,state_samples,map_projection,base_map_image_url}"
      - date: "2026-05-28"
        status: retracted
        claim: "Attributes legs, mowing_legs, traversal_legs, local_leg_count are no longer present on extra_state_attributes."
        retracts: "extra_state_attributes now also exposes legs (list[list[[x_m,y_m]]]), state_samples (list[[ts,state]]), map_projection ({bx2_mm,by2_mm,pixel_size_mm,width_px,height_px} or None), and base_map_image_url (static /api/dreame_a2_mower/work_log.png) — consumed by the dreame-mower-replay-card custom Lovelace card"
        reason: "legs / mowing_legs / traversal_legs / local_leg_count removed in the 2026-05-28 session-replay rewrite; replaced by track-derived attributes legs_timeline, track_first_ts, track_last_ts, distance_mowing_m, distance_traversal_m"
      - date: "2026-05-28"
        status: presumed
        claim: "extra_state_attributes exposes legs_timeline (track-derived, list of leg dicts with role/start_ts/end_ts/pts), track_first_ts, track_last_ts (unix seconds from archive track), distance_mowing_m, distance_traversal_m; these all derive from the archive per-point track stream via session_card.build_picked_session_summary"
    references:
      code: "custom_components/dreame_a2_mower/sensor.py"
      wire_entry: "archive_track; archive_cloud_track"
    notes: |
      Top-level (mower-device) sensor. Wired by T13 (render_work_log_session
      populates _picked_session_summary) and T14 (placeholder pick clears it).
      Dashboard Sessions tab reads attributes for per-session detail cards.

      As of the 2026-05-28 session-replay rewrite, all trail attributes are
      derived from the archive `track` per-point stream (see inventory.yaml
      § archive_track). The JS replay card consumes `legs_timeline` as its
      single trail input — the old `legs` / `mowing_legs` / `traversal_legs`
      / `local_leg_count` attributes no longer exist.

  - id: "binary_sensor.dreame_a2_mower_rain_protection_active"
    platform: binary_sensor
    class: "DreameA2BinarySensor"
    class_file: "custom_components/dreame_a2_mower/binary_sensor.py:45"
    device: parent
    source:
      wire: "s2p2 (one-shot transition) + s2p51_rain_protection[1]"
      state_path: "coord.rain_delay_active  (coordinator property — True for the whole wait window)"
    write_path: read-only
    status:
      seen_working: false
      last_verified: "2026-05-29"
    verifications:
      - date: "2026-05-15"
        status: retracted
        retracts: "binary_sensor.rain_protection_active reads true while the mower is in the rain-protection wait window"
        reason: |
          Prior value_fn (binary_sensor.py:50) was `coord.data.error_code == 56`,
          which only matches the one-shot s2p2=56 transition that fires once at
          rain-detect. After that, s2p2 advances to 54/idle/dock and the sensor
          flips off. The Dreame app correctly shows the protection STATE as
          active for the full wait window (WRP[1] resume_hours from the s2p2=56
          timestamp, or until the user taps Continue). The integration
          previously had no equivalent. User-observed drift 2026-05-15: mower
          at dock in rain-protection state, app shows active, sensor reads off.
      - date: "2026-05-29"
        status: presumed
        claim: "value_fn repointed to coordinator.rain_delay_active; sensor now reflects the whole rain-delay wait window, not just the momentary s2p2=56 flash"
    references:
      code: "custom_components/dreame_a2_mower/binary_sensor.py:45-51"
      wire_entry: "s2p2; s2p51_rain_protection"
    notes: |
      Correct implementation (deferred — captured here so it's not
      re-derived later):

      1. Capture `rain_detected_at: int | None` on the coordinator when
         s2p2=56 fires (handle in _mqtt_handlers or _property_apply alongside
         the existing one-shot error-code dispatch). Persist across HA
         restarts so the window survives a reboot.
      2. value_fn becomes:
           if rain_detected_at is None: return False
           if not state.rain_protection_enabled: return False
           wait_s = (state.rain_protection_resume_hours or 0) * 3600
           if wait_s == 0: return True   # "Don't Mow After Rain" never auto-resumes
           return (now - rain_detected_at) < wait_s
      3. Add a Continue-clears path. The wire surface for the app's Continue
         button is currently unknown (open question in inventory.yaml § s2p2);
         capture during a live press, then route into a `clear rain protection`
         handler that nulls `rain_detected_at`.
      4. s2p2=60 (Frost-protection-suppressed) is NOT a parallel state
         machine — FDP is a single 0/1 toggle with no wait window. The
         user reports frost-protection clears when ambient rises back
         above ~6 °C (no timer). Probe corpus has exactly one s2p2=60
         event (2026-04-27 07:58:02) so the clearing mechanism isn't
         observable yet. Distinct from s2p2=43 (Battery temperature low
         charging stopped) which is the more frequent overnight event
         (11 occurrences in corpus) and is a firmware safety, not a
         frost-protection feature. Don't combine these in one entity.

