# Dreame A2 Mower — showcase dashboard
# Updated 2026-05-11 (entity_ids corrected against live HA inventory).
#
# Per-map flipping uses `select.dreame_a2_mower_active_map`'s
# `current_map_id` attribute (added in the integration via v1.0.4a2).
#
# Per-map entities are namespaced under the integration's prefix:
#   map_id=0 → `<platform>.dreame_a2_mower_map_1_<key>`
#   map_id=1 → `<platform>.dreame_a2_mower_map_2_<key>`
# Per-map sub-device names are "Dreame A2 Mower Map N" (or "Dreame A2
# Mower <user-named-map>" when the Dreame app gave the map a custom
# name). HA's has_entity_name=True composes friendly_name and slug
# from device_name + entity_name automatically — see CLAUDE.md
# § "Per-map naming convention".
#
# Required helpers (add via Settings → Devices → Helpers, or copy
# `docs/superpowers/helpers/dreame-a2-helpers.yaml` into configuration.yaml):
#   - input_number.dreame_a2_mower_wifi_overlay_opacity
#   - input_number.dreame_a2_mower_lidar_tilt
#
# Required custom cards (install via HACS Frontend):
#   - card-mod      (for WiFi overlay opacity binding)
#   - dreame-a2-lidar-card  (bundled with the integration)
#
# Map count is 2 (live mower). Adding a 3rd map: copy any
# `conditional` block, change the state value to 2, and update
# entity references to match that map's registered naming.

# Per-tab title delimiter — defined here as YAML anchors, aliased from
# each tab's first card. Shape mirrors the "## 📊 Picked session — X"
# delimiter the Sessions tab uses for per-session sub-views: a 3px
# horizontal rule, then a single `##` line carrying emoji + tab name,
# optional em-dash + live value (per-map active map, archive count),
# and an inline small-grey-text helper note describing what the tab
# *is*. See docs/superpowers/specs/2026-05-16-dashboard-minor-design.md
# for the per-tab table.
#
# Small grey note uses an inline <span>; HA's markdown card passes
# inline HTML through `marked`. If a future HA version sanitizes the
# style attribute, fall back to <sub>…</sub> (always supported).

_tab_header_mower: &tab_header_mower
  type: markdown
  content: |
    <hr style="border:0;border-top:3px solid var(--primary-color);margin:12px 0 0 0;"/>

    ## 🤖 Mower — Active map: {{ states('select.dreame_a2_mower_active_map') }} &nbsp;<span style="font-size:0.75em;color:var(--secondary-text-color)">switch on Map Selector</span>

_tab_header_map_selector: &tab_header_map_selector
  type: markdown
  content: |
    <hr style="border:0;border-top:3px solid var(--primary-color);margin:12px 0 0 0;"/>

    ## 🗺️ Map Selector &nbsp;<span style="font-size:0.75em;color:var(--secondary-text-color)">drives the active map for every per-map tab</span>

_tab_header_settings_zones: &tab_header_settings_zones
  type: markdown
  content: |
    <hr style="border:0;border-top:3px solid var(--primary-color);margin:12px 0 0 0;"/>

    ## ⚙️ Settings & Zones — Active map: {{ states('select.dreame_a2_mower_active_map') }} &nbsp;<span style="font-size:0.75em;color:var(--secondary-text-color)">switch on Map Selector</span>

_tab_header_schedule: &tab_header_schedule
  type: markdown
  content: |
    <hr style="border:0;border-top:3px solid var(--primary-color);margin:12px 0 0 0;"/>

    ## 📅 Schedule — Active map: {{ states('select.dreame_a2_mower_active_map') }} &nbsp;<span style="font-size:0.75em;color:var(--secondary-text-color)">read-only on cloud; switch on Map Selector</span>

_tab_header_lidar: &tab_header_lidar
  type: markdown
  content: |
    <hr style="border:0;border-top:3px solid var(--primary-color);margin:12px 0 0 0;"/>

    ## 📡 LiDAR &nbsp;<span style="font-size:0.75em;color:var(--secondary-text-color)">archived 3-D point clouds</span>

_tab_header_wifi: &tab_header_wifi
  type: markdown
  content: |
    <hr style="border:0;border-top:3px solid var(--primary-color);margin:12px 0 0 0;"/>

    ## 📶 WiFi Coverage &nbsp;<span style="font-size:0.75em;color:var(--secondary-text-color)">signal strength as measured during mowing</span>

_tab_header_sessions: &tab_header_sessions
  type: markdown
  content: |
    <hr style="border:0;border-top:3px solid var(--primary-color);margin:12px 0 0 0;"/>

    ## 📊 Sessions — {{ states('sensor.dreame_a2_mower_archived_session_count') }} archived &nbsp;<span style="font-size:0.75em;color:var(--secondary-text-color)">calendar plus per-session breakdown</span>

_tab_header_more_settings: &tab_header_more_settings
  type: markdown
  content: |
    <hr style="border:0;border-top:3px solid var(--primary-color);margin:12px 0 0 0;"/>

    ## ⚙️ More Settings &nbsp;<span style="font-size:0.75em;color:var(--secondary-text-color)">device-wide settings (per-map ones live on Settings & Zones)</span>

_tab_header_diagnostics: &tab_header_diagnostics
  type: markdown
  content: |
    <hr style="border:0;border-top:3px solid var(--primary-color);margin:12px 0 0 0;"/>

    ## 🩺 Diagnostics &nbsp;<span style="font-size:0.75em;color:var(--secondary-text-color)">health checks and raw state</span>

_tab_header_tools: &tab_header_tools
  type: markdown
  content: |
    <hr style="border:0;border-top:3px solid var(--primary-color);margin:12px 0 0 0;"/>

    ## 🔧 Tools &nbsp;<span style="font-size:0.75em;color:var(--secondary-text-color)">helpers, services, manual ops</span>

_tab_header_photo_privacy: &tab_header_photo_privacy
  type: markdown
  content: |
    <hr style="border:0;border-top:3px solid var(--primary-color);margin:12px 0 0 0;"/>

    ## 🔒 Photo Privacy &nbsp;<span style="font-size:0.75em;color:var(--secondary-text-color)">review and delete AI-obstacle photos</span>

title: Dreame A2 Mower

# Custom cards used by this dashboard — register these as Lovelace
# resources via Settings → Dashboards → ⋮ → Resources. Per-dashboard
# YAML files cannot self-declare resources; the Resources UI is the
# authoritative source.
#
#   /hacsfiles/atomic-calendar-revive/atomic-calendar-revive.js (module)
#   /dreame_a2_mower/dreame-a2-lidar-card.js (module)
#   /dreame_a2_mower/dreame-a2-schedule-card.js (module)

views:
  - title: Mower
    path: mower
    type: panel
    icon: mdi:robot-mower-outline
    cards:
      - type: vertical-stack
        cards:
          # Header
          - *tab_header_mower

          # PIN-required emergency-stop banner
          - type: conditional
            conditions:
              - entity: binary_sensor.dreame_a2_mower_emergency_stop_activated
                state: "on"
            card:
              type: markdown
              content: |
                ## ⚠️ Emergency stop activated
                Enter the PIN code on the robot to unlock it. The mower
                will not mow until the PIN is accepted.

          # Row 1 — 2 columns: State (left) | Live Map (right)
          - type: grid
            columns: 2
            square: false
            cards:
              # State + sensors — surfaces the v1.0.8 state-machine entities
              # (current_activity, location, positioning_health, mqtt connectivity)
              # alongside battery + session area + the legacy in-dock / obstacle / rain flags.
              - type: entities
                title: State
                entities:
                  - entity: lawn_mower.dreame_a2_mower
                  - entity: sensor.dreame_a2_mower_current_activity
                  - entity: sensor.dreame_a2_mower_location
                  - entity: binary_sensor.dreame_a2_mower_mowing_session_active
                    name: Mowing session active
                  - entity: sensor.dreame_a2_mower_battery
                  - entity: sensor.dreame_a2_mower_charging_status
                  - entity: binary_sensor.dreame_a2_mower_mower_in_dock
                    name: In dock
                  - entity: sensor.dreame_a2_mower_positioning_health
                  - entity: sensor.dreame_a2_mower_mqtt_connectivity
                  - entity: binary_sensor.dreame_a2_mower_obstacle_detected
                  - entity: binary_sensor.dreame_a2_mower_rain_protection_active
                  - entity: sensor.dreame_a2_mower_active_selection
                  - entity: sensor.dreame_a2_mower_area_mowed
                    name: Session area mowed (m²)
              # Hero: live map for the active map.
              # 2026-05-14 diagnostic — reverting to a single non-conditional
              # picture-entity card, no aspect_ratio. Both maps fit (no clip)
              # at the cost of card-height jumping when the active map flips.
              # The conditional + per-map aspect_ratio attempt rendered as
              # nothing on the live HA (the entire card was missing, not just
              # empty content); will revisit once we identify why.
              - type: picture-entity
                entity: camera.dreame_a2_mower_map
                name: Live Map
                camera_view: auto
                show_state: false
                tap_action:
                  action: none
                hold_action:
                  action: none

          # Mowing target — single dropdown bound to the action mode; the
          # per-type target picker shows below based on the chosen mode.
          # Zone/Spot/Edge selects are per-active-map; we render the picker
          # for whichever map is currently active.
          # Placed ABOVE the action-button row so the user picks WHAT to mow
          # before being offered the buttons to start/pause/recharge.
          - type: entities
            title: Mowing target
            entities:
              - entity: select.dreame_a2_mower_action_mode
                name: Mode
          # Zone target — split by active map
          - type: conditional
            conditions:
              - entity: select.dreame_a2_mower_action_mode
                state: zone
              - entity: select.dreame_a2_mower_active_map
                attribute: current_map_id
                state: 0
            card:
              type: entities
              entities:
                - entity: select.dreame_a2_mower_map_1_zone
                  name: Zone
          - type: conditional
            conditions:
              - entity: select.dreame_a2_mower_action_mode
                state: zone
              - entity: select.dreame_a2_mower_active_map
                attribute: current_map_id
                state: 1
            card:
              type: entities
              entities:
                - entity: select.dreame_a2_mower_map_2_zone
                  name: Zone
          # Spot target — split by active map
          - type: conditional
            conditions:
              - entity: select.dreame_a2_mower_action_mode
                state: spot
              - entity: select.dreame_a2_mower_active_map
                attribute: current_map_id
                state: 0
            card:
              type: entities
              entities:
                - entity: select.dreame_a2_mower_map_1_spot
                  name: Spot
          - type: conditional
            conditions:
              - entity: select.dreame_a2_mower_action_mode
                state: spot
              - entity: select.dreame_a2_mower_active_map
                attribute: current_map_id
                state: 1
            card:
              type: entities
              entities:
                - entity: select.dreame_a2_mower_map_2_spot
                  name: Spot
          # Edge target — split by active map
          - type: conditional
            conditions:
              - entity: select.dreame_a2_mower_action_mode
                state: edge
              - entity: select.dreame_a2_mower_active_map
                attribute: current_map_id
                state: 0
            card:
              type: entities
              entities:
                - entity: select.dreame_a2_mower_map_1_edge
                  name: Edge
          - type: conditional
            conditions:
              - entity: select.dreame_a2_mower_action_mode
                state: edge
              - entity: select.dreame_a2_mower_active_map
                attribute: current_map_id
                state: 1
            card:
              type: entities
              entities:
                - entity: select.dreame_a2_mower_map_2_edge
                  name: Edge

          # Action row — state-aware. Rows are mutually exclusive based on
          # (current_activity, charging_status, in_dock, mowing_session_active).
          # Find Robot lives on the Tools tab under Recovery actions.

          # Row: Charging in mow → Continue · End
          - type: conditional
            conditions:
              - entity: binary_sensor.dreame_a2_mower_mowing_session_active
                state: "on"
              - entity: sensor.dreame_a2_mower_charging_status
                state: charging
            card:
              type: horizontal-stack
              cards:
                - type: button
                  entity: button.dreame_a2_mower_start_mowing
                  icon: mdi:play
                  name: Continue
                  show_state: false
                - type: button
                  entity: button.dreame_a2_mower_stop
                  icon: mdi:stop
                  name: End
                  show_state: false

          # Row: Charging not in mow → Start
          - type: conditional
            conditions:
              - entity: binary_sensor.dreame_a2_mower_mowing_session_active
                state: "off"
              - entity: sensor.dreame_a2_mower_charging_status
                state: charging
            card:
              type: horizontal-stack
              cards:
                - type: button
                  entity: button.dreame_a2_mower_start_mowing
                  icon: mdi:play
                  name: Start
                  show_state: false

          # Row: In dock, not charging → Start · Recharge
          - type: conditional
            conditions:
              - entity: binary_sensor.dreame_a2_mower_mower_in_dock
                state: "on"
              - entity: sensor.dreame_a2_mower_charging_status
                state: not_charging
              - entity: binary_sensor.dreame_a2_mower_mowing_session_active
                state: "off"
            card:
              type: horizontal-stack
              cards:
                - type: button
                  entity: button.dreame_a2_mower_start_mowing
                  icon: mdi:play
                  name: Start
                  show_state: false
                - type: button
                  entity: button.dreame_a2_mower_recharge
                  icon: mdi:battery-charging
                  name: Recharge
                  show_state: false

          # Row: Doing-something (mowing / cruising / mapping / returning) → Pause · End · Recharge
          - type: conditional
            conditions:
              - entity: sensor.dreame_a2_mower_current_activity
                state:
                  - mowing
                  - cruising_to_point
                  - fast_mapping
                  - returning
                  - repositioning
            card:
              type: horizontal-stack
              cards:
                - type: button
                  entity: button.dreame_a2_mower_pause
                  icon: mdi:pause
                  name: Pause
                  show_state: false
                - type: button
                  entity: button.dreame_a2_mower_stop
                  icon: mdi:stop
                  name: End
                  show_state: false
                - type: button
                  entity: button.dreame_a2_mower_recharge
                  icon: mdi:battery-charging
                  name: Recharge
                  show_state: false

          # Row: Paused in session → Continue · End · Recharge
          - type: conditional
            conditions:
              - entity: sensor.dreame_a2_mower_current_activity
                state: paused
            card:
              type: horizontal-stack
              cards:
                - type: button
                  entity: button.dreame_a2_mower_start_mowing
                  icon: mdi:play
                  name: Continue
                  show_state: false
                - type: button
                  entity: button.dreame_a2_mower_stop
                  icon: mdi:stop
                  name: End
                  show_state: false
                - type: button
                  entity: button.dreame_a2_mower_recharge
                  icon: mdi:battery-charging
                  name: Recharge
                  show_state: false

          # Row: Stopped on lawn idle (error / arrived at maintenance point) → Recharge
          - type: conditional
            conditions:
              - entity: sensor.dreame_a2_mower_current_activity
                state: idle
              - entity: binary_sensor.dreame_a2_mower_mower_in_dock
                state: "off"
              - entity: binary_sensor.dreame_a2_mower_mowing_session_active
                state: "off"
            card:
              type: horizontal-stack
              cards:
                - type: button
                  entity: button.dreame_a2_mower_recharge
                  icon: mdi:battery-charging
                  name: Recharge
                  show_state: false

          # Row 3 — 3 columns: Mower activity | GPS Tracking | Head to Maintenance Point
          - type: grid
            columns: 3
            square: false
            cards:
              # Filtered activity timeline. Backed by the integration's two
              # event entities (lifecycle = mowing-started/paused/resumed/ended,
              # dock arrived/departed; alert = the s2p2 notification codes
              # like rain_protection / low_battery_return / stuck etc).
              # Distinct from the full device Activity panel which lists every
              # state change — this view is curated to the events the user
              # actually cares about being notified of.
              #
              # NOTE: each event currently shows TWICE in the logbook — once as
              # the EventEntity state change (rendered with a generic message),
              # once as the integration's bus event (rendered with the proper
              # human message via custom_components/dreame_a2_mower/logbook.py).
              # HA's logbook component bypasses async_describe_event for state
              # changes, so the only way to suppress the duplicate is via
              # configuration.yaml's logbook exclude list:
              #
              #   logbook:
              #     exclude:
              #       entities:
              #         - event.dreame_a2_mower_lifecycle
              #         - event.dreame_a2_mower_alert
              #
              # That keeps the entities live (so templates and automations can
              # still trigger on them) while removing the duplicate logbook
              # entries.
              - type: logbook
                title: Mower activity
                hours_to_show: 48
                entities:
                  - event.dreame_a2_mower_lifecycle
                  - event.dreame_a2_mower_alert

              # GPS map — disabled until we identify a working live-location source.
              # Original YAML kept in the .pre-cleanup-20260513.yaml.bak file.
              - type: markdown
                content: |
                  ### 🚧 GPS Tracking
                  Work in progress — Dreame does not expose live GPS
                  coordinates over the cloud API. The map will reappear here
                  once we identify the correct source.

              # Head-to-Maintenance-Point — disabled until the cruise op is reachable.
              - type: markdown
                content: |
                  ### 🚧 Head to Maintenance Point
                  Work in progress — the cruise-to-point command (op=109) is
                  not routable from the integration via the cloud-RPC surface.
                  See `docs/research/cruise-to-point-todo.md`.

  - title: Map Selector
    path: maps
    type: panel
    icon: mdi:map-marker-multiple
    cards:
      - type: vertical-stack
        cards:
          - *tab_header_map_selector

          # ─── Active map preview: middle 50% width, centred ───
          # Bound to `camera.dreame_a2_mower_map` which is the integration's
          # live "current active map" camera — it swaps automatically when
          # the active-map selection changes, so the picker tiles below stay
          # visually identical while this preview reflects the choice. The
          # picture-entity `name:` field does NOT evaluate Jinja, so the
          # active-map name is provided by the markdown caption above it.
          - type: markdown
            content: |
              ### 🟢 Active map: {{ states('select.dreame_a2_mower_active_map') }}
            card_mod:
              style: |
                ha-card {
                  width: 50%;
                  margin: 0 auto;
                  text-align: center;
                }
          - type: picture-entity
            entity: camera.dreame_a2_mower_map
            show_state: false
            show_name: false
            camera_view: auto
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  width: 50%;
                  margin: 0 auto;
                }

          # ─── Sub-tab delimiter ───
          - type: markdown
            content: |
              <hr style="border:0;border-top:2px dashed var(--divider-color);margin:16px 0 4px 0;"/>

              #### 👇 Pick a map below to make it the active map

          # ─── Picker grid: 4 columns, all tiles visually identical ───
          # Click any tile to set it active. The big preview above swaps
          # to reflect the new selection; the tiles themselves stay the
          # same. Empty trailing cells until more maps are added.
          - type: grid
            columns: 4
            square: false
            cards:
              - type: vertical-stack
                cards:
                  - type: picture-entity
                    entity: camera.dreame_a2_mower_map_1_base
                    show_state: false
                    show_name: false
                    camera_view: auto
                    tap_action:
                      action: call-service
                      service: select.select_option
                      target:
                        entity_id: select.dreame_a2_mower_active_map
                      data:
                        option: "Map 1"
                  - type: markdown
                    content: |
                      **Map 1** — {{ '%.2f' | format(states('sensor.dreame_a2_mower_map_1_area') | float(0)) }} m²

              - type: vertical-stack
                cards:
                  - type: picture-entity
                    entity: camera.dreame_a2_mower_map_2_base
                    show_state: false
                    show_name: false
                    camera_view: auto
                    tap_action:
                      action: call-service
                      service: select.select_option
                      target:
                        entity_id: select.dreame_a2_mower_active_map
                      data:
                        option: "Map 2"
                  - type: markdown
                    content: |
                      **Map 2** — {{ '%.2f' | format(states('sensor.dreame_a2_mower_map_2_area') | float(0)) }} m²

  - title: Settings & Zones
    path: settings-zones
    type: panel
    icon: mdi:tune
    cards:
      - type: vertical-stack
        cards:
          - *tab_header_settings_zones

          # 3-column grid: zone counts (col 1) | custom mode (col 2) | pathway obstacle (col 3)
          - type: grid
            columns: 3
            square: false
            cards:
              # Col 1 — all existing per-map content stacked
              - type: vertical-stack
                cards:
                  # Base map for the active map. The per-map camera renders the
                  # base PNG when the live trail is NOT active on that map_id, so
                  # both map_1 and map_2 show as base-only here unless the active
                  # mow is happening on this tab's map at this moment.
                  - type: conditional
                    conditions:
                      - entity: select.dreame_a2_mower_active_map
                        attribute: current_map_id
                        state: "0"
                    card:
                      type: picture-entity
                      entity: camera.dreame_a2_mower_map_1_base
                      name: "Map 1 — base"
                      camera_view: auto
                      show_state: false
                      tap_action:
                        action: more-info
                  - type: conditional
                    conditions:
                      - entity: select.dreame_a2_mower_active_map
                        attribute: current_map_id
                        state: "1"
                    card:
                      type: picture-entity
                      entity: camera.dreame_a2_mower_map_2_base
                      name: "Map 2 — base"
                      camera_view: auto
                      show_state: false
                      tap_action:
                        action: more-info

                  # Per-zone-type list cards, per map. Read-only — write surface
                  # unknown (see docs/research/map-edit-write-todo.md).
                  - type: entities
                    title: Zone counts
                    show_header_toggle: false
                    entities:
                      - entity: sensor.dreame_a2_mower_map_1_exclusion_zones
                        name: Map 1 — Exclusion zones
                      - entity: sensor.dreame_a2_mower_map_2_exclusion_zones
                        name: Map 2 — Exclusion zones
                      - entity: sensor.dreame_a2_mower_map_1_ignore_obstacle_zones
                        name: Map 1 — Ignore-obstacle zones
                      - entity: sensor.dreame_a2_mower_map_2_ignore_obstacle_zones
                        name: Map 2 — Ignore-obstacle zones
                      - entity: sensor.dreame_a2_mower_map_1_maintenance_points
                        name: Map 1 — Maintenance points
                      - entity: sensor.dreame_a2_mower_map_2_maintenance_points
                        name: Map 2 — Maintenance points
                      - entity: sensor.dreame_a2_mower_map_1_spots
                        name: Map 1 — Spots
                      - entity: sensor.dreame_a2_mower_map_2_spots
                        name: Map 2 — Spots
                  - type: markdown
                    content: >
                      Read-only — all map edits happen in the Dreame app. See
                      `docs/research/map-edit-write-todo.md` for the write-surface
                      research status.

                  # General Mode — per-map settings, ordered to match the
                  # Dreame app's per-map Settings page (OLD/APP_INFO.txt
                  # "Settings in General Mode" section). Per-map switches +
                  # numbers + selects render only for the currently-active
                  # map (driven by select.dreame_a2_mower_active_map's
                  # current_map_id attribute).
                  - type: conditional
                    conditions:
                      - entity: select.dreame_a2_mower_active_map
                        attribute: current_map_id
                        state: "0"
                    card:
                      type: entities
                      title: General Mode (Map 1)
                      entities:
                        - entity: select.dreame_a2_mower_map_1_mowing_efficiency
                        - entity: number.dreame_a2_mower_map_1_mowing_height
                        - entity: select.dreame_a2_mower_map_1_mowing_direction
                        - entity: switch.dreame_a2_mower_map_1_automatic_edge_mowing
                        - entity: switch.dreame_a2_mower_map_1_safe_edge_mowing
                        - entity: switch.dreame_a2_mower_map_1_edgemaster
                        - entity: switch.dreame_a2_mower_map_1_obstacle_avoidance_on_edges
                        - entity: switch.dreame_a2_mower_map_1_lidar_obstacle_recognition
                        - entity: number.dreame_a2_mower_map_1_obstacle_avoidance_height
                        - entity: switch.dreame_a2_mower_map_1_ai_obstacle_recognition_humans
                        - entity: switch.dreame_a2_mower_map_1_ai_obstacle_recognition_animals
                        - entity: switch.dreame_a2_mower_map_1_ai_obstacle_recognition_objects
                        - entity: number.dreame_a2_mower_map_1_obstacle_avoidance_distance
                  - type: conditional
                    conditions:
