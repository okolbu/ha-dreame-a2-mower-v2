# State-machine audit expectations
#
# One entry per entity, keyed by `<platform>.<key>`. Drives the audit
# verifier in tools/state_machine_audit.py.
#
# Schema:
#   <platform>.<key>:
#     holder: snapshot | mower_state | cloud_state | live_map | other
#     idle:   "persisted_value" | <literal>    # value expected at cold-start
#                                              # with no MQTT activity.
#     reboot: required | unavailable_ok        # required → must survive HA
#                                              # reboot; reading from a
#                                              # non-persisted source = RED.
#
# Idle literals:
#   - 0, "", null            — literal expected value
#   - "persisted_value"      — any non-None value carried over from snapshot
#   - "unavailable"          — entity is expected to be unavailable when idle
#
# Add a `note` field to explain non-obvious decisions.

# ---------------------------------------------------------------------------
# binary_sensor
# ---------------------------------------------------------------------------

binary_sensor.battery_temp_low:
  holder: mower_state
  idle: false
  reboot: required
  note: "Fault flag from s1p1 heartbeat. Idle = no fault → False."

binary_sensor.bumper:
  holder: mower_state
  idle: false
  reboot: required
  note: "Fault flag from heartbeat byte. Idle = no fault → False."

binary_sensor.dock_in_lawn_region:
  holder: mower_state
  idle: unavailable
  reboot: unavailable_ok
  note: "CFG-backed (cloud cache); briefly Unknown at cold-start until cloud poll fills (~5-30s)."

binary_sensor.drop_tilt:
  holder: mower_state
  idle: false
  reboot: required
  note: "Fault flag from heartbeat byte. Idle = no fault → False."

binary_sensor.edgemaster:
  holder: mower_state
  idle: false
  reboot: required
  note: "PRE-derived edgemaster active flag. Idle = False outside session."

binary_sensor.emergency_stop:
  holder: mower_state
  idle: false
  reboot: required
  note: "Safety fault flag. Idle = no e-stop → False."

binary_sensor.failed_to_return_to_station:
  holder: mower_state
  idle: false
  reboot: required
  note: "Derived from error_code; idle = no error → False. (Sourcing is RED; that's tracked separately by check 1.)"

binary_sensor.lift:
  holder: mower_state
  idle: false
  reboot: required
  note: "Fault flag from heartbeat byte. Idle = no fault → False."

binary_sensor.mowing_session_active:
  holder: snapshot
  idle: false
  reboot: required
  note: "Snapshot.mow_session == IN_SESSION; initial = BETWEEN_SESSIONS → False."

binary_sensor.mower_in_dock:
  holder: snapshot
  idle: true
  reboot: required
  note: "Initial Location is AT_DOCK → True."

binary_sensor.obstacle_detected:
  holder: mower_state
  idle: false
  reboot: required
  note: "Mid-session live flag. Idle = no obstacle → False."

binary_sensor.photo_consent:
  holder: mower_state
  idle: unavailable
  reboot: unavailable_ok
  note: "CFG-backed (cloud cache); briefly Unknown at cold-start until cloud poll fills (~5-30s)."

binary_sensor.positioning_failed:
  holder: mower_state
  idle: false
  reboot: required
  note: "Derived from error_code; idle = no error → False."

binary_sensor.rain_protection_active:
  holder: mower_state
  idle: false
  reboot: required
  note: "Derived from error_code; idle = no rain event → False."

binary_sensor.safety_alert_active:
  holder: mower_state
  idle: false
  reboot: required
  note: "Aggregated safety fault flag. Idle = no alert → False."

binary_sensor.top_cover_open:
  holder: mower_state
  idle: false
  reboot: required
  note: "Derived from error_code; idle = cover closed → False."

binary_sensor.wheel_bind_active:
  holder: mower_state
  idle: false
  reboot: required
  note: "Wheel-bind fault flag. Idle = no fault → False."

