      state_path: "coordinator._wifi_render_entry (_map_id, obj_name) → coordinator._get_wifi_body_cached(obj_name)"
    write_path: read-only
    status:
      seen_working: false
      last_verified: "2026-05-31"
    verifications:
      - date: "2026-05-31"
        status: presumed
        claim: "Ported from code 2026-05-31: renders the WiFi heatmap OBJ body selected by DreameA2WifiArchiveSelect via coordinator._wifi_render_entry; applies flip_x/flip_y from input_boolean helpers at render time. Unavailable until body is loaded. Rotates access_token on selection change. Read from _camera_wifi.py:12-136; not re-confirmed live."
        evidence: "_camera_wifi.py:38-42 (__init__ → mower_unique_id 'wifi_selected'); _camera_wifi.py:67-84 (async_camera_image); _camera_wifi.py:124-136 (_handle_coordinator_update)"
    references:
      code: "custom_components/dreame_a2_mower/_camera_wifi.py:12"
    notes: |
      Cross-map WiFi heatmap camera on the parent device. Follows the
      DreameA2WifiArchiveSelect picker via coordinator._wifi_render_entry.
      Flip toggles (input_boolean.dreame_a2_mower_wifi_flip_x/y) are
      read at render time and bust the entity_picture cache automatically.
      Unavailable (available=False) when no entry is selected or the body
      has not yet loaded from cloud. Cache-busted via entity_picture URL hash
      + access_token rotation on selection change.

  - id: "camera.dreame_a2_mower_map_N_wifi_heatmap"
    platform: camera
    class: "DreameA2WifiPerMapCamera"
    class_file: "custom_components/dreame_a2_mower/_camera_wifi.py:139"
    device: per-map
    source:
      wire: "rendered from cloud wifimap OBJ — newest archive entry tagged to this map_id"
      state_path: "coordinator._wifi_archive_index filtered by map_id → newest entry → coordinator._wifi_archive_store.load_body(entry.object_name)"
    write_path: read-only
    status:
      seen_working: false
      last_verified: "2026-05-31"
    verifications:
      - date: "2026-05-31"
        status: presumed
        claim: "Ported from code 2026-05-31: renders the newest WiFi heatmap OBJ whose tagged map_id matches the camera's bound map_id. map_id correlation via fingerprint matcher (wifi_match.match_heatmap_to_session) with geometry inference fallback. Unavailable when no tagged entry exists. Read from _camera_wifi.py:139-258; not re-confirmed live."
        evidence: "_camera_wifi.py:162-176 (__init__ → map_unique_id 'wifi_heatmap'); _camera_wifi.py:178-185 (_resolve_entry); _camera_wifi.py:200-217 (async_camera_image)"
    references:
      code: "custom_components/dreame_a2_mower/_camera_wifi.py:139"
    notes: |
      Per-map WiFi heatmap camera (one per logical map, per-map device).
      Renders newest archive entry whose tagged map_id matches; correlation
      driven by fingerprint matcher with geometry-inference fallback.
      Unavailable while no tagged entry exists for the map (e.g., brand-new
      map awaiting cloud heatmap generation). Flip toggles applied at render
      time same as wifi_heatmap_selected. Distinct from wifi_heatmap_selected
      which follows the archive picker; this camera is fixed to one map_id.

  - id: "camera.dreame_a2_mower_work_log"
