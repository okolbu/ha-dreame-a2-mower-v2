  - id: "binary_sensor.dreame_a2_mower_human_presence_scenario_mowing"
    platform: binary_sensor
    class: "DreameA2BinarySensor (config-driven)"
    class_file: "custom_components/dreame_a2_mower/binary_sensor.py"
    device: parent
