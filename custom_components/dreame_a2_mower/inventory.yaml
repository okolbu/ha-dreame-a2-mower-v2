      protocol_doc: "docs/research/inventory/generated/g2408-canonical.md § Heartbeat (s1p1) bytes"
    verifications:
      - date: "2026-05-30"
        status: retracted
        retracts: "Startup state machine byte. Transitions through a fixed sequence during device boot: 0 → 64 → 68 → 4 → 5 → 7 → 135. Steady-state value after full boot is 135."
        reason: |
          Corpus cross-tab (_s1p1.py, 66,083 s1p1 frames / 9 logs) shows byte[14]
          is an activity/locomotion-state byte correlated with s2p1 mode, NOT a
          one-time boot sequence: it is 0 while DOCKED (mode 6/13, 95-97%) and
          135 while MOWING (mode 1, 95%), with 0x80-range sub-states for
          returning/idle. The 0→64→68→4→5→7→135 walk is the undock→operating
          (reorient) transition that runs on every undock, not just boot, and the
          docked steady-state is 0, not 135. Re-named startup_state_machine →
          locomotion_state and downgraded confirmed → partial.
        evidence: "_s1p1.py per-mode byte[14] distribution over probe_log_*.jsonl (9 logs, 66,083 frames, 2026-04-17..05-30); 2026-05-30 popup capture @ 17:25 (docked byte[14]=0 → undock walk → 135)"
    open_questions:
      - "Enumerate the 0x80-range sub-states: does the low nibble during 'returning' (136/139/140/141/143/148) step monotonically through return phases, or is it a flag field? Capture a labelled return-to-dock."
      - "byte[13] (undocumented, 19 corpus values) is ALSO mode-correlated (255 when docked/charge-done, 35 mowing, 40 returning, building-specific 17-27) — likely a companion state byte to [14]; characterise together."
      - "Maintenance/fault sub-states extend the 0x80 range: a 2026-05-30 at-point maintenance (deliberate tilt + lid-open + PIN) drove byte[14] 132→164 (0xA4) while the tilt/PIN-lockout was asserted (s2p2=1 tilted, 23 emergency_stop, 73 top_cover_open), then back to 132 on PIN clear — so 164 = a tilted/locked-out at-point sub-state. Consistent with 'activity+condition state', not boot."

