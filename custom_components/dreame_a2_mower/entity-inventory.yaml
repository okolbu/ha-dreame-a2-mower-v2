# Dreame A2 Mower — integration entity inventory.
#
# Source of truth for "which HA entity reads from which wire surface,
# how does it write back, and what's been verified end-to-end".
#
# See CLAUDE.md § "Fact discipline" for when and how to update this
# file. The paired wire-truth registry is `inventory.yaml` in this
# same directory.
#
# Schema (per entity):
#
#   - id: "<platform>.<unique_id_suffix>"
#     platform: switch | sensor | select | number | binary_sensor | camera | button
#     class: "<Python class name>"
#     class_file: "<path:line>"
#     device: parent | per-map | sub-device
#     source:
#       wire: "<surface-key>[<index>]"        # cite the inventory.yaml entry id
#       state_path: "<runtime read path>"      # how the entity gets the value
#     write_path: read-only | "<routed-action / cfg key / etc.>"
#     status:
#       seen_working: bool                     # tested end-to-end on live HA
#       last_verified: "YYYY-MM-DD"
#     verifications:
#       - date: "YYYY-MM-DD"
#         status: verified | partial | presumed | retracted
#         claim: "..."
#         evidence: "..."
#         retracts: "..."                      # for status=retracted
#         reason: "..."                        # for status=retracted
#     references:
#       wire_entry: "<inventory.yaml id>"
#       code: "<path:line>"
#       docs: "<path:section>"                 # optional
#     notes: |
#       optional clarifying prose
#
# Populate lazily. When you touch an entity platform file, add or
# update the entry for the entity you touched (per the CI gate in
# .github/workflows/ci.yml).

entities:

  # ------------------------------------------------------------------
  # Live-map and per-map cameras
  # ------------------------------------------------------------------

  - id: "camera.dreame_a2_mower_map"
    platform: camera
    class: "DreameA2MapCamera"
    class_file: "custom_components/dreame_a2_mower/camera.py:61"
    device: parent
    source:
      wire: "rendered from cloud MAP + s1p4 trail"
      state_path: "coordinator._main_view_png"
    write_path: read-only
    status:
      seen_working: true
      last_verified: "2026-05-14"
    verifications:
      - date: "2026-05-14"
        status: verified
        claim: "re-renders within ~1s of MAPL active-map flip after fix; previously took up to 1min for the cloud_state refresh"
        evidence: "coordinator/_mqtt_handlers.py § _apply_mapl — async_create_task(_render_main_view()) added in _handle_mapl_update"
      - date: "2026-05-14"
        status: retracted
        retracts: "dashboard live-map card uses conditional aspect_ratios per active map to avoid object-fit:cover clipping"
        reason: "conditional + per-map-aspect_ratio attempt rendered as a blank card slot on live HA after reboot — the whole card was missing, not empty content. Reverted to a single non-conditional picture-entity with no aspect_ratio; card height varies between maps but neither clips. Root cause of the conditional failure not identified — per_map_header at the top of the same view uses an apparently-identical pattern (conditional → picture-entity with aspect_ratio) and renders fine. Possible differences: aspect_ratio value (int 969 from `16:9` sexagesimal parse vs string '637x717'/'291x287'), or camera entity (per-map static camera vs the live active-map follower). Worth revisiting once we have a minimal repro."
      - date: "2026-05-14"
        status: verified
        claim: "last-session obstacle overlay visible on live map immediately after boot (v1.0.11a3)"
        evidence: "user confirmed after reboot with v1.0.11a3; latest map-0 session 2026-05-13_1778697514_7bff1b02.json had 7 obstacles (polygon point counts 7-9)"
      - date: "2026-05-14"
        status: retracted
        retracts: "obstacles overlay always appears on the live map"
        reason: "v1.0.11a1 regressed this — the new early-render-on-MAPL path triggered _load_last_session_obstacles before session_archive.load_index() had completed at coordinator setup line 991. Empty index → cached `[]` for the active map → cache stayed poisoned until session-finalize invalidation. v1.0.11a2 guarded the empty-cache write on `_index_loaded`, but didn't re-trigger _render_main_view; the PNG produced earlier (with no obstacles) was still served until the next periodic refresh or live-trail event. v1.0.11a3 added an explicit _render_main_view after load_index completes."
    references:
      code: "custom_components/dreame_a2_mower/camera.py:61"
      wire_entry: "MAPL"
    notes: |
      Active-map follower — the PNG content depends on _active_map_id.
      Map 1 renders at 637x717, Map 2 at 291x287. Dashboard live-map
      card is a single non-conditional picture-entity with no
      aspect_ratio; both maps display at their natural aspect.

