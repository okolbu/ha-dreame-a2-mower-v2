# custom_components/dreame_a2_mower/services.yaml

set_active_selection:
  description: >
    Set the ordered list of zones or spots to be mowed by the next "Start"
    action when action_mode is zone or spot. Updates the integration's
    persistent selection state.
  fields:
    zones:
      description: Zone IDs in mowing order. Empty list to clear zone selection.
      example: "[3, 1, 2]"
      selector:
        object:
    spots:
      description: Spot IDs in mowing order. Empty list to clear spot selection.
      example: "[1]"
      selector:
        object:

mow_zone:
  description: >
    One-shot — set zone selection then start mowing. Equivalent to
    set_active_selection with zones=… followed by lawn_mower.start_mowing
    when action_mode=zone.
  fields:
    zone_ids:
      description: Zone IDs in mowing order.
      required: true
      example: "[3, 1, 2]"
      selector:
        object:

mow_edge:
  description: >
    Edge-mow specific contours. Each contour_id is a [map_id, contour_id]
    pair as returned by the cloud map. Pass an empty list (or omit
    contour_ids) to edge every contour in the current map.
  fields:
    contour_ids:
      description: List of [map_id, contour_id] pairs, e.g. [[1, 0], [1, 1]].
      example: "[[1, 0]]"
      selector:
        object:

mow_spot:
  description: >
    Mow one or more named spot zones (defined in the Dreame app and
    served by the cloud map). Spot IDs are visible as the suffix on
    select.spot's options.
  fields:
    spot_ids:
      description: Spot zone IDs to mow.
      required: true
      example: "[1, 2]"
      selector:
        object:

recharge:
  description: Send the mower to the charging dock immediately.

find_bot:
  description: Make the mower beep so you can locate it.

lock_bot:
  description: Toggle the child lock.

suppress_fault:
  description: Clear a recoverable error condition.

finalize_session:
  description: >
    Manually finalize the in-progress session. Use when the cloud-side
    session-summary fetch fails permanently and the in-progress entry
    is stuck. F5 wires the auto-finalize gate; this is the user-facing
    escape hatch.

replay_session:
  description: >
    Render an archived session's path into the live map camera for
    playback. The camera entity shows the replay until the next
    _refresh_map tick (every 6 hours or on map data change). To exit
    replay mode wait for the next refresh, or trigger any other action
    that calls _refresh_map.
  fields:
    session_md5:
      description: MD5 of the session to replay (matches sensor.archived_session_count's attributes).
      required: true
      example: "abcd1234..."
      selector:
        text:

show_lidar_fullscreen:
  name: Show LiDAR fullscreen
  description: >
    Fires a `dreame_a2_mower_lidar_fullscreen` event on the HA bus.
    Lovelace cards configured to listen for this event can pop up the
    full-resolution LiDAR view. No parameters today; the convention
    exists for future extensibility.
  fields: {}

dump_map_diagnostics:
  name: Dump map diagnostics
  description: >
    One-off diagnostic service for nav_paths investigation. Fetches raw
    cloud batch data and logs per-map top-level keys, non-empty slot
    counts, and probes alternative batch prefixes (M_PATH, PATH, NAV,
    LINK, MPATH). Results appear in the HA log at WARNING level with the
    prefix "dump_map_diagnostics:". No parameters required.
  fields: {}

discover_cloud_api:
  name: Discover cloud API
  description: >
    Recursive cloud-API discovery service. Fetches the full batch via an
    empty-list get_batch_device_datas call (which returns every key the
    cloud has for this device), groups keys by prefix family, reassembles
    chunked families (PREFIX.0..N + PREFIX.info), JSON-decodes them, and
    walks the structure recording type / key-list / sample values at each
    path. Also probes every cfg_individual endpoint in the integration's
    catalog (CFG, DEV, NET, MAPL, MISTA, etc.). Writes a structured
    report to <config>/dreame_a2_mower/api_discovery.json. No parameters
    required; results available via SCP within ~10 seconds.
  fields: {}
