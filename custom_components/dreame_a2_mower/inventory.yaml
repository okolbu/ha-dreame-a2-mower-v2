  - id: "map_key_cleanPoints"
    name: "cleanPoints"
    category: "oss_map_key"
    payload_shape: "{dataType:'Map', value:[[pt_id, {id, type, shapeType, path:[{x,y}]}]...]}"
    semantic: |
      Maintenance Points — user-pinned markers in the app. Sample 2026-04-24 has
