    class_file: "custom_components/dreame_a2_mower/sensor_map.py:22"
    device: per-map
    source:
      wire: "cloud MAP blob (map_key_name)"
      state_path: "coordinator.cloud_state.maps_by_id[map_id].name (fallback: 'Map N+1')"
    write_path: read-only
    status:
      seen_working: false
      last_verified: "2026-05-31"
    verifications:
      - date: "2026-05-31"
        status: presumed
        claim: "reads MapData.name from cloud MAP blob; returns 'Map N' fallback when name is empty so dashboard is never blank"
    references:
      wire_entry: "map_key_name"
      code: "custom_components/dreame_a2_mower/sensor_map.py:22"
    notes: |
      Cloud frequently returns empty `name`; the Dreame app shows a
      "Map N" default in that case. mirror_it so the dashboard isn't blank.
      map_id is 0-based on the wire; humans count from 1.

