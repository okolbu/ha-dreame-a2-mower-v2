        evidence: "sensor_device.py:821-822 (native_value → entity_description.value_fn(self.coordinator))"
    references:
      wire_entry: "varies — see notes for per-key wire surfaces"
      code: "custom_components/dreame_a2_mower/sensor_device.py:795"
    notes: |
      Config-driven base class. One HA entity instantiated per entry in the
      DIAGNOSTIC_SENSORS tuple (sensor_device.py:486). Descriptor keys backed
      as of 2026-05-31:
        battery_level          — coord.state_machine.snapshot().battery_percent (s3p1)
        wifi_rssi_dbm          — coord.state_machine.snapshot().wifi_rssi_dbm (s1p1)
        position_x_m           — coord.state_machine.snapshot().position_x_m (s1p4)
        position_y_m           — coord.state_machine.snapshot().position_y_m (s1p4)
        position_north_m       — coord.state_machine.snapshot().position_north_m (derived)
        position_east_m        — coord.state_machine.snapshot().position_east_m (derived)
        mowing_phase           — coord.state_machine.snapshot().mowing_phase (s1p4)
        task_state_code        — coord.state_machine.snapshot().task_state_code (s2p56)
        slam_task_label        — coord.state_machine.snapshot().slam_task_label (s2p65)
        novel_observations     — coord.novel_registry.snapshot().count
        data_freshness         — age of oldest freshness-tracked field in seconds
        mqtt_age_s             — seconds since last s1p1 heartbeat
        api_endpoints_supported — count of accepted API endpoints from cloud.endpoint_log
        hardware_serial        — coord.data.hardware_serial (CFG.DEV.sn)
        firmware_version_dev   — coord.data.firmware_version (CFG.DEV.fw)
        ota_capable_raw        — coord.data.ota_capable_raw (CFG.DEV.ota)
        cloud_device_id        — coord._cloud.device_id (cloud account record ID)
        mac_address            — coord._cloud.mac_address (WiFi MAC from cloud)
      Snapshot-backed sensors survive HA restarts; MowerState-backed sensors
      in DIAGNOSTIC_SENSORS use value_fn(coord) not value_fn(coord.data) to
      access the state machine directly.

