  - id: "s1p4_33b_x_mm"
    variant: "33-byte"
    field_name: "x_mm"
    bytes: "[1-5] (packed)"
    payload_shape: "20-bit signed; x = (b[2]<<28 | b[1]<<20 | b[0]<<12) >> 12"
    unit:
      wire: "mm"
      display: "m"
      scale: 0.001
      format: "{:.2f} m"
      notes: |
        20-bit signed packed decode (apk §parseRobotPose). Both axes stored
        in the same 5-byte window; X uses b[1], b[2], b[3]_low_nibble.
        Result is in map-scale mm (= same coordinate space as MAP/cleanPoints
        dock positions). Corrected decoder landed in alpha.98 — prior code
        used int16_le with a 16× Y overshoot compensated by scattered 0.625
        factors; all removed.
    semantic: |
      X position in the dock-relative coordinate frame (map-scale mm).
      Origin (0,0) = charging station. +X points toward the house (mower's
      nose direction when docked); -X points into the lawn. X is in cm on
      the old int16 layout; the 20-bit decode and ×10 scaling unifies both
      axes to mm. See §3.1 coordinate-frame notes. apk-corrected decoder
      landed in alpha.98.
    status:
      seen_on_wire: true
      first_seen: "2026-04-17"
      last_seen: "2026-05-05"
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    references:
      apk: "ioBroker.dreame/apk.md §parseRobotPose"
      integration_code: "custom_components/dreame_a2_mower/protocol/telemetry.py"
      protocol_doc: "docs/research/inventory/generated/g2408-canonical.md § Telemetry (s1p4) fields"

  - id: "s1p4_33b_y_mm"
    variant: "33-byte"
    field_name: "y_mm"
    bytes: "[1-5] (packed)"
    payload_shape: "20-bit signed; y = (b[4]<<24 | b[3]<<16 | b[2]<<8) >> 12"
    unit:
      wire: "mm"
      display: "m"
      scale: 0.001
      format: "{:.2f} m"
      notes: |
        Same 5-byte packed window as x_mm; Y uses b[2]_high_nibble, b[3],
        b[4]. Prior code read b[3-4] as int16_le producing a 16× overshoot;
        the 20-bit decode removes all downstream × 0.625 compensations.
        Y encoder reports ~1.6× true distance — multiply raw y_mm × 0.625
        (configurable per-install) for real metres. X needs no calibration.
    semantic: |
      Y position in the dock-relative coordinate frame (map-scale mm).
      ±Y is perpendicular to the X axis (left/right when facing the house).
      Y-axis calibration: tape-measure-verified 0.625 factor (encoder
      over-reports by ~1.6×); factor is per-install configurable. Confirmed
      alpha.98 via full probe-corpus replay (14.7k frames).
    status:
      seen_on_wire: true
      first_seen: "2026-04-17"
      last_seen: "2026-05-05"
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    references:
