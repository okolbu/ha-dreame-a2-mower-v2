  - title: Schedule
    path: schedule
    icon: mdi:calendar-clock
    cards:
      - type: markdown
        content: |
          # Schedule
          Per-slot schedule editing is BT-only on the g2408 today; this
          integration only exposes the master toggles where present and a
          read-only summary. Use the Dreamehome app for slot editing.

  - title: LiDAR
    path: lidar
    icon: mdi:cube-scan
    cards:
      - type: custom:dreame-a2-lidar-card
        url: /api/dreame_a2_mower/lidar/latest.pcd
        show_map: true
        map_entity: camera.dreame_a2_mower_map
      - type: markdown
        content: |
          The card supports drag-to-orbit, wheel-to-zoom, and a slider
          for splat size. Tap the **⛶** button (top-right) for an
          interactive fullscreen view; ESC, the **×** button, or a
          backdrop click dismisses. The **↺** button restores the
          default camera angle if you've orbited into a confusing pose.

          Splat size, soft-edge toggle, map underlay (incl. Z and flip),
          and the camera viewpoint all persist across dashboard reloads.

          The `dreame_a2_mower.show_lidar_fullscreen` service opens the
          fullscreen overlay too — useful from automations or scripts.
      - type: entity
        entity: sensor.dreame_a2_mower_lidar_archive_count
        name: Archived scans

  - title: Sessions
    path: sessions
    icon: mdi:history
    cards:
      # Replay map — markdown card with templated <img> src instead of
      # picture-entity. picture-entity (any camera_view) ignores the
      # entity_picture override and routes via /api/camera_proxy/ with a
      # JWT-signed URL whose response has no Cache-Control header — so
      # the browser caches across session picks and the map only updates
      # on a hard refresh. Verified 2026-05-07 by inspecting the
      # browser's Network tab: img URL was
      # /api/camera_proxy/camera.dreame_a2_mower_map?authSig=…
      # (decoded JWT path = /api/camera_proxy/camera.dreame_a2_mower_map,
      # exp=iat+30s).
      #
      # The integration's MapImageView at /api/dreame_a2_mower/map.png
      # emits Cache-Control: no-store, max-age=0. Pointing the <img> src
      # there with a SHA1-based ?v= cache-bust pulled from the camera
      # entity's image_version attribute means every replay-session pick
      # produces a new URL → fresh fetch → MapImageView hit. The Jinja
      # ?v= guards against any cache anyway.
      - type: markdown
        content: >-
          <img alt="Replay map"
          src="/api/dreame_a2_mower/map.png?v={{
          state_attr('camera.dreame_a2_mower_map', 'image_version') or 'init' }}"
          style="width:100%;aspect-ratio:637/717;display:block"/>
      - type: markdown
        content: |
          Pick a session below to render its mowed track on the map.
          The replay stays visible until the next periodic map refresh
          (every 6 hours) or until you start a live mow.
          
          Sessions tagged **⚠ (partial trail)** had a Home Assistant
          restart during the mow — the cloud trajectory is still complete
          but the local live-trail capture is short.
      - type: entities
        title: Latest session
        entities:
          - entity: sensor.dreame_a2_mower_latest_session_area
          - entity: sensor.dreame_a2_mower_latest_session_duration
          - entity: sensor.dreame_a2_mower_latest_session_time
      - type: entities
        title: Archive
        entities:
          - entity: sensor.dreame_a2_mower_archived_session_count
          - entity: select.dreame_a2_mower_replay_session
      - type: horizontal-stack
        cards:
          - type: button
            name: Finalize stuck session
            tap_action:
              action: call-service
              service: dreame_a2_mower.finalize_session
          - type: markdown
            content: |
              Use **Finalize stuck session** if a mowing session has
              stopped on the mower but the integration is still showing
              "fetching summary" for more than 30 minutes.

  - title: Diagnostics
    path: diagnostics
    icon: mdi:wrench-cog-outline
    cards:
      - type: entities
        title: Novel observations
        entities:
          - entity: sensor.dreame_a2_mower_novel_observations
      - type: markdown
        content: |
          `sensor.dreame_a2_mower_data_freshness` and
          `sensor.dreame_a2_mower_api_endpoints_supported` are
          default-disabled. Enable them in Settings → Devices &
          Services → Dreame A2 Mower → Entities to surface them
          on this dashboard.
      - type: entities
        title: Archive counts
        entities:
          - entity: sensor.dreame_a2_mower_archived_session_count
          - entity: sensor.dreame_a2_mower_lidar_archive_count
      - type: entities
        title: Mower internals
        entities:
          - entity: sensor.dreame_a2_mower_mowing_phase
          - entity: sensor.dreame_a2_mower_task_state
          - entity: sensor.dreame_a2_mower_slam_task
          - entity: sensor.dreame_a2_mower_wifi_rssi
          - entity: sensor.dreame_a2_mower_session_track_point_count
          - entity: binary_sensor.dreame_a2_mower_mowing_session_active
          - entity: sensor.dreame_a2_mower_last_settings_change
      - type: entities
        title: Consumables
        entities:
          - entity: sensor.dreame_a2_mower_blades_life
          - entity: sensor.dreame_a2_mower_cleaning_brush_life
          - entity: sensor.dreame_a2_mower_robot_maintenance_life
          - entity: sensor.dreame_a2_mower_total_mowing_time
          - entity: sensor.dreame_a2_mower_total_mowed_area
          - entity: sensor.dreame_a2_mower_mowing_count
          - entity: sensor.dreame_a2_mower_first_mowing_date
