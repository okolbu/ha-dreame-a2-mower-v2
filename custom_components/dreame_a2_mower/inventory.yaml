  - id: "summary_trajectory"
    key_path: "trajectory"
    name: "trajectory_list"
    category: "session_summary"
    payload_shape: "[{id:[int, ...], data:[[x_cm, y_cm]...], track:[[x_cm, y_cm] | TRACK_BREAK_MARKER, ...]}, ...]"
    semantic: |
      Each entry carries TWO fields with very different roles:

      - ``data``: closed-loop lawn outline polygon, ~100-109 cm-encoded points
        (first ≈ last). Identical across every session captured against the
        same lawn snapshot; changes only when the user redraws the boundary
        in the Dreame app.
      - ``track``: the actual mowed path for EDGE-MODE sessions (mode 101).
        Same wire convention as boundary.track — list of [x_cm, y_cm] rows
        interleaved with int32-max sentinel rows that split into continuous
        segments. Empty for non-edge modes.

      So the field name "trajectory" is a misnomer: ``data`` is geometry,
      ``track`` is per-session path data — and only present for edge.

      Coordinate frame: dock-relative centimetres.

      Mode-to-path-source mapping (full survey):
        mode 100 (all_areas / zone) → map[i].track
        mode 101 (edge)             → trajectory[].track    ← here
        mode 102 (all_areas)        → map[i].track
        mode 103 (spot)             → spot[N].track for mowed N
    status:
      seen_on_wire: true
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    verifications:
      - date: "2026-05-26"
        status: verified
        claim: "trajectory[].data is the lawn outline (closed polygon). Same extent across sessions on the same lawn; only changes when the user edits the boundary."
        evidence: "oss_dumps/INDEX.txt — 17 session blobs over 11 days; trajectory.data extent x:[-1092,2089] y:[-1407,1733] across all sessions until 2026-05-21 18:22 when it grew to y:[-1407,2054] (boundary edit), then stayed constant. Closed-loop check: first ≈ last with ~0.15m gap."
        retracts: "High-level planning path. Each entry has a composite id (two ints) and a data array of [x, y] waypoints. Purpose: likely the routing skeleton used by the firmware's path planner."
        reason: "Identical content across every session, including spot mows that took totally different paths — incompatible with the planning-path hypothesis."
      - date: "2026-05-26"
        status: verified
        claim: "trajectory[0].track carries the edge-mow path (mode 101). Three edge OSS blobs each had 1583-3313 valid track points; extent matches lawn boundary; coordinate frame is cm. Empty for all non-edge modes."
        evidence: "oss_dumps/ali_dreame_2026_05_{16,17,23}_*.json — 3 edge mows, traj.track populated; oss_dumps/INDEX.txt cross-mode audit shows traj.track empty for modes 100/102/103."
        retracts: "Edge mow / mode 101 → empty (firmware does not record the perimeter walk in OSS; live MQTT capture is the only source)."
        reason: "I only inspected trajectory[0].data on first survey and missed the sibling .track field. The edge path WAS in the OSS all along — under the wrong-looking parent."

  - id: "summary_spot_track"
    key_path: "spot[N].track"
    name: "spot_track"
    category: "session_summary"
    payload_shape: "list[[x_cm, y_cm]]; sentinel [2147483647, 2147483647] marks track breaks"
    semantic: |
      Per-spot mowing path for spot-mode sessions (mode 103). The session JSON
      carries a global spot[] array enumerating ALL spot areas defined on the
      lawn; only the spot that was actually mowed in THIS session has its
      `.track` field populated. Other spots in the array have just `.data`
      (the corner polygon).

      Coordinates are dock-relative centimetres (divide by 100 for metres).
      Includes int32-max sentinel rows [2147483647, 2147483647] marking
      track breaks (likely lift-up / pen-up moments), same role as
      TRACK_BREAK_MARKER in map[].track.

      The integration's parse_session_summary._decode_map_layer currently
      handles type=0 (boundary) and type=2 (exclusion) but returns None for
      type=3 (spot), so this field is silently dropped. Spot mows therefore
      get cloud_legs=[] from the parser even though the path is in the blob.
      Fix track: extend _decode_map_layer or add a sibling spot-track
      extractor.
    status:
      seen_on_wire: true
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
