        status: retracted
        retracts: "_attr_name was set to the map name (`map_name or f\"Map {map_id+1}\"`); produced doubled friendly_name \"Map 1 Map 1\" / \"Map 2 Map 2\""
        reason: "device_info already names the sub-device after the map, and has_entity_name=True prepends it — explicit _attr_name = map_name caused the doubling. Fixed by setting _attr_name = \"Base\""
      - date: "2026-05-14"
        status: verified
