title: Dreame A2 Mower
views:
  - title: Mower
    path: mower
    icon: mdi:robot-mower-outline
    cards:
      # PIN-required emergency-stop banner — mirrors the Dreame app's
      # modal popup. Only visible when byte[3] bit 7 is set (i.e. the
      # mower is locked out pending PIN entry on the device).
      - type: conditional
        conditions:
          - entity: binary_sensor.dreame_a2_mower_emergency_stop_activated
            state: "on"
        card:
          type: markdown
          content: |
            ## ⚠️ Emergency stop activated
            Enter the PIN code on the robot to unlock it. The mower
            will not mow until the PIN is accepted.
      # Live Map. aspect_ratio set to the actual rendered map's WxH so the
      # whole lawn is visible without cropping. Tweak to match your own
      # map's proportions (printed by `image_version` attribute / sized
      # by the lawn's bbox); the bundled value matches the reference
      # g2408 development map.
      - type: picture-entity
        entity: camera.dreame_a2_mower_map
        name: Live Map
        camera_view: live
        show_state: false
        aspect_ratio: 637x717
      # Active map selector — read-only Phase 1; mirrors the mower's
      # firmware-selected active map (cloud MAPL is the source of truth).
      - type: entities
        title: Map
        entities:
          - entity: select.dreame_a2_mower_active_map
            name: Active map
      - type: entities
        title: State
        entities:
          - entity: lawn_mower.dreame_a2_mower
          - entity: sensor.dreame_a2_mower_battery
          - entity: sensor.dreame_a2_mower_charging_status
          - entity: device_tracker.dreame_a2_mower_location
            name: Location
          - entity: binary_sensor.dreame_a2_mower_mower_in_dock
            name: In dock
          - entity: binary_sensor.dreame_a2_mower_obstacle_detected
          - entity: binary_sensor.dreame_a2_mower_rain_protection_active
      # Per-state button rows. The Dreame app shows different controls
      # depending on whether the mower is mowing, paused, docked, or
      # returning; mirror that here so users see only the relevant
      # actions for the current state. Each `conditional` keys off
      # `lawn_mower.dreame_a2_mower`'s activity.
      #
      # Activity values: mowing, paused, docked, returning, error,
      # unknown. The error/unknown fallback row at the bottom shows
      # only Find my robot — the SUPPRESS_FAULT action is power-user
      # only (see docs/TODO.md "MowerAction.SUPPRESS_FAULT semantics").
      - type: conditional
        conditions:
          - entity: lawn_mower.dreame_a2_mower
            state: mowing
        card:
          type: horizontal-stack
          cards:
            - type: button
              entity: button.dreame_a2_mower_pause
              name: Pause
            - type: button
              entity: button.dreame_a2_mower_stop
              name: Stop
            - type: button
              entity: button.dreame_a2_mower_recharge
              name: Recharge
            - type: button
              entity: button.dreame_a2_mower_find_my_robot
              name: Find my robot
              icon: mdi:map-marker-radius
      - type: conditional
        conditions:
          - entity: lawn_mower.dreame_a2_mower
            state: paused
        card:
          type: horizontal-stack
          cards:
            # While paused, START_MOWING resumes the same session — the
            # firmware treats it as a continue. Relabel for clarity.
            - type: button
              entity: button.dreame_a2_mower_start_mowing
              name: Continue
              icon: mdi:play-circle
            - type: button
              entity: button.dreame_a2_mower_stop
              name: Stop
            - type: button
              entity: button.dreame_a2_mower_recharge
              name: Recharge
            - type: button
              entity: button.dreame_a2_mower_find_my_robot
              name: Find my robot
              icon: mdi:map-marker-radius
      - type: conditional
        conditions:
          - entity: lawn_mower.dreame_a2_mower
            state: docked
        card:
          type: horizontal-stack
          cards:
            - type: button
              entity: button.dreame_a2_mower_start_mowing
              name: Start
            - type: button
              entity: button.dreame_a2_mower_find_my_robot
              name: Find my robot
              icon: mdi:map-marker-radius
      - type: conditional
        conditions:
          - entity: lawn_mower.dreame_a2_mower
            state: returning
        card:
          type: horizontal-stack
          cards:
            - type: button
              entity: button.dreame_a2_mower_pause
              name: Pause
            - type: button
              entity: button.dreame_a2_mower_stop
              name: Stop
            - type: button
              entity: button.dreame_a2_mower_find_my_robot
              name: Find my robot
              icon: mdi:map-marker-radius
      # Fallback row for error/unknown. `state_not` would suppress this
      # in any of the rows above, but Lovelace conditional cards only
      # support a single state match per condition — list each
      # non-fallback activity as a `state_not` so the row hides whenever
      # one of the dedicated rows is showing.
      - type: conditional
        conditions:
          - entity: lawn_mower.dreame_a2_mower
            state_not: mowing
          - entity: lawn_mower.dreame_a2_mower
            state_not: paused
          - entity: lawn_mower.dreame_a2_mower
            state_not: docked
          - entity: lawn_mower.dreame_a2_mower
            state_not: returning
        card:
          type: horizontal-stack
          cards:
            - type: button
              entity: button.dreame_a2_mower_find_my_robot
              name: Find my robot
              icon: mdi:map-marker-radius
      - type: entities
        title: What to mow
        entities:
          - entity: select.dreame_a2_mower_action_mode
          - entity: select.dreame_a2_mower_zone
          - entity: select.dreame_a2_mower_spot
          - entity: select.dreame_a2_mower_edge
          - entity: sensor.dreame_a2_mower_active_selection
      # Live telemetry — only shown while a mowing session is active.
      - type: conditional
        conditions:
          - entity: binary_sensor.dreame_a2_mower_mowing_session_active
            state: "on"
        card:
          type: entities
          title: Current mow
          entities:
            - entity: sensor.dreame_a2_mower_area_mowed
              name: Area mowed
            - entity: sensor.dreame_a2_mower_target_area
              name: Target area
            - entity: sensor.dreame_a2_mower_session_distance
              name: Distance
            - entity: sensor.dreame_a2_mower_session_track_point_count
              name: Track points
            - entity: sensor.dreame_a2_mower_active_selection
              name: Mowing
            - entity: sensor.dreame_a2_mower_mowing_phase
              name: Phase
      - type: entities
        title: Alerts
        entities:
          - entity: binary_sensor.dreame_a2_mower_robot_lifted
          - entity: binary_sensor.dreame_a2_mower_robot_tilted
          - entity: binary_sensor.dreame_a2_mower_top_cover_open
          - entity: binary_sensor.dreame_a2_mower_bumper_error
          - entity: binary_sensor.dreame_a2_mower_emergency_stop_activated
          - entity: binary_sensor.dreame_a2_mower_pin_required
          - entity: binary_sensor.dreame_a2_mower_positioning_failed
          - entity: binary_sensor.dreame_a2_mower_battery_temperature_low
          - entity: binary_sensor.dreame_a2_mower_failed_to_return_to_station
          - entity: binary_sensor.dreame_a2_mower_wheel_bind_detected
          - entity: binary_sensor.dreame_a2_mower_safety_alert_active
          - entity: sensor.dreame_a2_mower_error_code
          - entity: sensor.dreame_a2_mower_error
      - type: entities
        title: Firmware
        entities:
          - entity: update.dreame_a2_mower_update
            name: Firmware update
          - entity: switch.dreame_a2_mower_pre_release
            name: HACS pre-releases
      - type: horizontal-stack
        cards:
          - type: button
            entity: button.dreame_a2_mower_finalize_session
            name: Finalize stuck session
            icon: mdi:flag-checkered
          - type: button
            entity: button.dreame_a2_mower_refresh_from_cloud
            name: Refresh from cloud
            icon: mdi:cloud-refresh

  - title: Mowing Settings
    path: mowing-settings
    icon: mdi:grass
    cards:
      - type: entities
        title: Mowing mode
        entities:
          - entity: select.dreame_a2_mower_mowing_efficiency
          - entity: select.dreame_a2_mower_navigation_path
          - entity: switch.dreame_a2_mower_smart_navigation_path
            name: Smart navigation path
          - entity: select.dreame_a2_mower_mowing_direction
          - entity: select.dreame_a2_mower_mowing_direction_mode
            name: Direction pattern
      # Per-map (active-map) measurements — these are SETTINGS-backed
      # entities. Reads work; writes go to the cloud cache but the
      # device firmware doesn't apply them on this firmware (Phase 3
      # — see docs/research/wire-captures/settings-surface-cloud-only-2026-05-09.md).
      # Marked with the warning banner so users know to use the Dreame
      # app for actual changes until Phase 3 lands.
      - type: markdown
        content: |
          > ⚠ The settings below READ correctly, but currently WRITES
          > only update the cloud cache and do **not** drive the device
          > firmware on this firmware. Use the Dreame app to actually
          > change them. Phase 3 (HTTPS sniff of the app's Save tap)
          > will unlock writes — see `docs/TODO.md`.
      - type: entities
        title: Mowing measurements (active map — read-only effective)
        entities:
          - entity: number.dreame_a2_mower_mowing_height
            name: Mowing height
          - entity: number.dreame_a2_mower_cutter_height
            name: Cutter height
          - entity: number.dreame_a2_mower_cutter_position
            name: Cutter position
          - entity: number.dreame_a2_mower_edge_passes
            name: Edge passes
      - type: entities
        title: Edge mowing (active map — read-only effective)
        entities:
          - entity: switch.dreame_a2_mower_edge_mowing_auto
            name: Automatic edge mowing
          - entity: switch.dreame_a2_mower_edge_mowing_safe
            name: Safe edge mowing
          - entity: switch.dreame_a2_mower_edge_mowing_obstacle_avoidance
            name: Obstacle avoidance on edges
          - entity: select.dreame_a2_mower_edge_walk_mode
            name: Edge walk mode
      - type: entities
        title: Obstacle avoidance (active map — read-only effective)
        entities:
          - entity: switch.dreame_a2_mower_obstacle_avoidance_enabled
            name: LiDAR obstacle recognition
          - entity: number.dreame_a2_mower_obstacle_avoidance_height
            name: Obstacle avoidance height
          - entity: number.dreame_a2_mower_obstacle_avoidance_distance
            name: Obstacle avoidance distance
          - entity: number.dreame_a2_mower_obstacle_avoidance_sensitivity
            name: Obstacle avoidance sensitivity
          - entity: switch.dreame_a2_mower_ai_human_detection
            name: Capture photos on obstacles
          - entity: switch.dreame_a2_mower_ai_obstacle_recognition_humans
            name: AI recognise humans
          - entity: switch.dreame_a2_mower_ai_obstacle_recognition_animals
            name: AI recognise animals
          - entity: switch.dreame_a2_mower_ai_obstacle_recognition_objects
            name: AI recognise objects
          - entity: switch.dreame_a2_mower_ai_obstacle_photos
            name: AI obstacle photos
      - type: entities
        title: Weather protection
        entities:
          - entity: switch.dreame_a2_mower_rain_protection
          - entity: select.dreame_a2_mower_rain_protection_resume_hours
          - entity: switch.dreame_a2_mower_frost_protection
      - type: entities
        title: Session stats
        entities:
          - entity: sensor.dreame_a2_mower_latest_session_area
          - entity: sensor.dreame_a2_mower_latest_session_duration
          - entity: sensor.dreame_a2_mower_latest_session_time
          - entity: sensor.dreame_a2_mower_area_mowed
          - entity: sensor.dreame_a2_mower_session_distance

