    references:
      code: "custom_components/dreame_a2_mower/binary_sensor.py:45-51"
      wire_entry: "s2p2; s2p51_rain_protection"
    notes: |
      Correct implementation (deferred — captured here so it's not
      re-derived later):

      1. Capture `rain_detected_at: int | None` on the coordinator when
         s2p2=56 fires (handle in _mqtt_handlers or _property_apply alongside
         the existing one-shot error-code dispatch). Persist across HA
         restarts so the window survives a reboot.
      2. value_fn becomes:
           if rain_detected_at is None: return False
           if not state.rain_protection_enabled: return False
           wait_s = (state.rain_protection_resume_hours or 0) * 3600
           if wait_s == 0: return True   # "Don't Mow After Rain" never auto-resumes
           return (now - rain_detected_at) < wait_s
      3. Add a Continue-clears path. The wire surface for the app's Continue
         button is currently unknown (open question in inventory.yaml § s2p2);
         capture during a live press, then route into a `clear rain protection`
         handler that nulls `rain_detected_at`.
      4. s2p2=60 (Frost-protection-suppressed) is NOT a parallel state
         machine — FDP is a single 0/1 toggle with no wait window. The
         user reports frost-protection clears when ambient rises back
         above ~6 °C (no timer). Probe corpus has exactly one s2p2=60
         event (2026-04-27 07:58:02) so the clearing mechanism isn't
         observable yet. Distinct from s2p2=43 (Battery temperature low
         charging stopped) which is the more frequent overnight event
         (11 occurrences in corpus) and is a firmware safety, not a
         frost-protection feature. Don't combine these in one entity.

