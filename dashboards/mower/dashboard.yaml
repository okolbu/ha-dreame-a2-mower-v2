                    name: Lift alarm
                  - entity: switch.dreame_a2_mower_anti_theft_off_map_alarm
                    name: Off-map alarm
                  - entity: switch.dreame_a2_mower_anti_theft_realtime_location
                    name: Realtime location

              # ───── Human Presence ─────
