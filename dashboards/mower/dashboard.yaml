                        state: "1"
                    card:
                      type: entities
                      title: General Mode (Map 2)
                      entities:
                        - entity: select.dreame_a2_mower_map_2_mowing_efficiency
                        - entity: number.dreame_a2_mower_map_2_mowing_height
                        - entity: select.dreame_a2_mower_map_2_mowing_direction
                        - entity: switch.dreame_a2_mower_map_2_automatic_edge_mowing
                        - entity: switch.dreame_a2_mower_map_2_safe_edge_mowing
                        - entity: switch.dreame_a2_mower_map_2_edgemaster
                        - entity: switch.dreame_a2_mower_map_2_obstacle_avoidance_on_edges
                        - entity: switch.dreame_a2_mower_map_2_lidar_obstacle_recognition
                        - entity: number.dreame_a2_mower_map_2_obstacle_avoidance_height
                        - entity: switch.dreame_a2_mower_map_2_ai_obstacle_recognition_humans
                        - entity: switch.dreame_a2_mower_map_2_ai_obstacle_recognition_animals
                        - entity: switch.dreame_a2_mower_map_2_ai_obstacle_recognition_objects
                        - entity: number.dreame_a2_mower_map_2_obstacle_avoidance_distance

                  # Zone editor — per-map zone/spot/edge targets.
