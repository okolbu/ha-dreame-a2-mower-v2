      102: "zone"
      103: "spot"
    semantic: |
      Session mode code = the mow-type op: 100=all_areas, 101=edge, 102=zone,
      103=spot (identical to the s2p50 TASK op 100/101/102/103). This is the
      RELIABLE per-session mow-type record — firmware-produced and present in the
      OSS summary even for scheduled mows whose s2p50 op never echoed on MQTT.
      Distinct from MowerState.action_mode (user dropdown intent, not a record).
    status:
      seen_on_wire: false
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    references:
      integration_code: "custom_components/dreame_a2_mower/protocol/session_summary.py"
      protocol_doc: "docs/research/inventory/generated/g2408-canonical.md § Session-summary JSON fields"
    verifications:
      - date: "2026-05-30"
        status: verified
        claim: |
          mode = mow-type op enum, decoded across 10 OSS summaries in oss_dumps/
          (2026-05-20..26): mode=100 all-area mows, 101 edge (05-23 19:00 sched edge),
          102 zone (05-20 19:02), 103 spot (05-21/25/26 spot mows incl. multi-spot).
          1:1 with the s2p50 TASK op. Answers the prior open question (yes, mode
          distinguishes all-areas/edge/zone/spot).
        evidence: "oss_dumps/ali_dreame_2026_05_2*_*.json.pretty.json mode fields cross-referenced with run type (s2p50 op when echoed + schedule)"
      - date: "2026-05-15"
        status: presumed
        claim: "session_card.MODE_LABELS holds best-effort enum mappings; unmapped values render as 'raw=N' on the dashboard's Picked-session card"

