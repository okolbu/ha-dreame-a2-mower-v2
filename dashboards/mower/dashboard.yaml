                    name: LCD language
                  - entity: number.dreame_a2_mower_voice_volume
                    name: Volume

  - title: Diagnostics
    path: diagnostics
    type: panel
    icon: mdi:wrench
    cards:
      - type: vertical-stack
        cards:
          - *tab_header_diagnostics

          # 3-column grid: 5 cards in order (paired notes merged as footers).
          - type: grid
            columns: 3
            square: false
            cards:
              # `entities` footer only supports buttons/graph/picture, so
              # the explanatory markdown sits as a vertical-stack sibling.
              - type: vertical-stack
                cards:
                  - type: entities
                    title: Device identity
                    entities:
                      - entity: sensor.dreame_a2_mower_firmware_version_dev
                        name: Firmware version
                      - entity: sensor.dreame_a2_mower_cloud_device_id
                        name: Cloud device id
                      - entity: sensor.dreame_a2_mower_api_endpoint
                        name: API endpoint
                      - entity: sensor.dreame_a2_mower_integration_version
                        name: Integration version
                  - type: markdown
                    content: |
                      Serial number + MAC address are on the Device info card
                      (Settings → Devices → Dreame A2 Mower).

              - type: vertical-stack
                cards:
                  - type: entities
                    title: Connectivity
                    entities:
                      - entity: sensor.dreame_a2_mower_wifi_rssi
                        name: WiFi RSSI (dBm)
                      - entity: sensor.dreame_a2_mower_wifi_ssid
                        name: WiFi SSID
                      - entity: sensor.dreame_a2_mower_wifi_ip
                        name: WiFi IP
                      - entity: sensor.dreame_a2_mower_mqtt_connectivity
                        name: MQTT connectivity
                      - entity: sensor.dreame_a2_mower_data_freshness
                        name: Data freshness (s since last update)
                  - type: markdown
                    content: |
                      - **Bluetooth:** not observable from this integration
                      - **Cellular:** g2408 has a cellular radio but no
                        cellular-status surface is exposed by the cloud API
                        we've reverse-engineered. Connectivity figures here are
                        WiFi/MQTT only.
                      - **MQTT / API protocol version:** not exposed by Dreame
                        cloud

              - type: entities
                title: Cloud refresh
                entities:
                  - entity: sensor.dreame_a2_mower_data_freshness
                    name: Data freshness

              - type: markdown
                content: |
                  ### 🚧 Cloud-state version / settings versions (not yet implemented)

                  `sensor.dreame_a2_mower_cloud_state_version`,
                  `sensor.dreame_a2_mower_settings_version_canonical`, and
                  `sensor.dreame_a2_mower_settings_version_applied` are not yet
                  exposed as entities.

              - type: markdown
                content: |
                  ### Novel-log buffer

                  The integration captures unknown-property and unknown-value
                  events into a ring buffer of 200 entries. Use
                  `dreame_a2_mower.download_diagnostics` (Tools tab) to
                  download.

