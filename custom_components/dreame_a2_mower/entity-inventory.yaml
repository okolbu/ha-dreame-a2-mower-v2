      last_verified: "2026-05-31"
    verifications:
      - date: "2026-05-31"
        status: presumed
        claim: "Ported from code 2026-05-31: renders whichever scan DreameA2LidarArchiveSelect has selected via coordinator._lidar_render_entry; falls back to active map's latest scan when nothing selected. Rotates access_token on every render-entry change. Read from _camera_lidar.py:102-188; not re-confirmed live."
        evidence: "_camera_lidar.py:117-161 (async_camera_image); _camera_lidar.py:181-188 (_handle_coordinator_update → async_update_token)"
    references:
      wire_entry: "s99p20"
      code: "custom_components/dreame_a2_mower/_camera_lidar.py:102"
