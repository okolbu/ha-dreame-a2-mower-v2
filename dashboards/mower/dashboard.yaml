  # Hidden tab: linked from the AI Photos section's "Open privacy policy"
  # button. Renders the verbatim Dreame "AI Obstacle Recognition Privacy
  # Policy" inline so users can review it inside HA without leaving the
  # dashboard. Same policy text is also bundled at
  # custom_components/dreame_a2_mower/data/privacy_policy_photo.md and
  # served via the dreame_a2_mower.show_photo_privacy_policy service.
  - title: Photo Privacy Policy
    path: photo-privacy
    icon: mdi:file-document-outline
    visible: false
    cards:
      - type: entities
        title: Acceptance status (read-only)
        entities:
          - entity: binary_sensor.dreame_a2_mower_photo_consent
            name: Privacy-policy accepted (photo capture)
          - entity: switch.dreame_a2_mower_ai_obstacle_photos
            name: Capture photos of AI-detected obstacles
      # Conditional: NOT accepted yet → big "you need to accept in the app" banner.
      - type: conditional
        conditions:
          - entity: binary_sensor.dreame_a2_mower_photo_consent
            state: "off"
        card:
          type: markdown
          content: |
            ## ⚠ Privacy policy not yet accepted

            **You must accept this policy in the Dreame app before
            `switch.ai_obstacle_photos` will have any effect on the
            device.** The integration cannot flip the consent bit on
            your behalf — `CFG.REC[7]` writes are not supported on
            this firmware, and policy acceptance has to be a
            deliberate human step anyway.

            **Steps in the Dreame app:**

            1. Open the Dreame app → device → AI Obstacle Recognition.
            2. Tap *Privacy Policy for Capturing and Transmitting Photos*.
            3. Read all pages of the policy (the same text as below).
            4. Tap **Accept Authorization** at the bottom.

            After accepting, tap **Refresh from cloud** below or wait
            for the next 10-min poll — `binary_sensor.photo_consent`
            should flip to `on`.
      # Conditional: ACCEPTED → short banner.
      - type: conditional
        conditions:
          - entity: binary_sensor.dreame_a2_mower_photo_consent
            state: "on"
        card:
          type: markdown
          content: |
            ## ✓ Already accepted in the app

            `switch.ai_obstacle_photos` will drive the device.
            To decline, use *Cancel Authorization* in the Dreame
            app's privacy policy sub-page.
      - type: markdown
        content: |
          *Note on integration behaviour:* `switch.ai_obstacle_photos`
          and `binary_sensor.photo_consent` are **separate CFG keys**
          (AOP and REC respectively), even though the Dreame app
          presents them as one feature with a sub-screen. Toggling
          AOP from HA does not flip the consent bit — the device
          decides whether to actually capture photos based on AND of
          the two.
      - type: markdown
        content: |
          ## AI Obstacle Recognition Privacy Policy

          Thank you for using our AI Obstacle Recognition function.
          Before using our services, please carefully read the "Smart
          Robotic Mower Privacy Policy" and this privacy policy.

          Please note that during your use of the AI Obstacle
          Recognition function, your smart robotic mower may capture
          information about the location of the device and related
          personnel in the vicinity, such as information about people
          in your courtyard and the distribution of items. In this
          process, we may collect some of your sensitive personal
          information, such as facial recognition data. For the
          processing of your sensitive personal information and the
          access to relevant permissions, we will remind you to pay
          attention in "bold" form. If you agree to this privacy
          policy, it means you allow us to process your sensitive
          personal information in the manner described below.

          We will provide you with one or more of the following
          services under the AI Obstacle Recognition Alarm function
          to enable the robotic mower to avoid obstacles, allow you
          to view obstacle photos, and help us improve the accuracy
          of AI obstacle recognition:

          (1) **Automatic Obstacle Avoidance**: Through this
          function, the robotic mower can automatically avoid people,
          animals, and objects using AI;

          (2) **Obstacle Photography**: After enabling this feature,
          the robotic mower will take photos of recognized objects
          and push them to you via the App. You can view and provide
          feedback on whether the recognition is accurate.

          Please note that if you place your smart robotic mower in
          your or other people's private space, or choose to make it
          run during your or other people's private activities, the
          videos, pictures, or radar sensor data generated after the
          above functions are activated may still contain your or
          other people's personal information such as privacy,
          portrait, or facial recognition information. When using
          the robotic mower, please comply with local laws and
          regulations that may apply to video surveillance, and pay
          attention to the shooting angle to avoid capturing images
          of public areas.

          Please note that, in accordance with regulatory and
          compliance requirements for transparency and information,
          when using the robotic mower:

          (1) The robotic mower will provide a voice prompt every
          15 minutes stating, "Video security is in progress".

          (2) The corresponding indicator light on the robotic mower
          will remain flashing.

          The AI Obstacle Recognition function will start running
          only after you choose to turn it on. You can choose to
          turn it off at any time, and the AI Obstacle Recognition
          function will stop running after it is turned off. The
          image information generated by your use of this function
          will be sent to your App account and presented in the form
          of pictures. To implement the AI Obstacle Recognition
          function, we need you to turn on the camera permission of
          the smart robotic mower in your App. When you use the "AI
          Obstacle Recognition", your smart robotic mower will
          detect and classify the human, animals, and objects through
          algorithms, identify human characteristics, and may take
          pictures. The legal basis for processing your personal
          information is your consent. You can withdraw your consent
          in accordance with the "Smart robotic Mower Privacy
          Policy". If you refuse to turn on the relevant permissions
          or refuse us to collect this information, we will not be
          able to provide you with the relevant services of the AI
          Obstacle Recognition, but it will not affect your normal
          use of the basic functions of the smart robotic mower.

          To ensure the security of your personal information to the
          greatest extent, if you use our AI Obstacle Recognition
          function, the obstacle pictures recognized by the AI of
          your smart robotic mower will be displayed to you on the
          App through our server located in Germany in the form of a
          media stream in an encrypted environment. During this
          process, we will not collect or store any of your video
          information. If you use our AI Obstacle Recognition Alarm
          function, the videos and pictures you actively capture
          will be encrypted and stored on our cloud servers, Alibaba
          Cloud, located in Germany. We will not have access to your
          video or picture information. Before the original human
          shape pictures of you or others are uploaded to our cloud
          servers, we will anonymize the aforementioned pictures,
          ensuring that even when combined with other information,
          the anonymized pictures cannot identify individuals. You
          can view, download, or delete the videos and pictures you
          captured in the "Album" at any time. You can delete it
          yourself through the APP or contact us to help you delete
          it at any time. If you do not proactively delete them, the
          aforementioned videos and pictures will be stored on the
          cloud server for 30 days and will be automatically deleted
          afterward. We promise not to use the obstacle pictures
          recognized by AI under this function for other purposes,
          and we will adopt necessary technical and organizational
          measures, such as SHA256 encryption, rootfs verification,
          AES encryption, etc. to protect the security of your or
          others' personal information. We will only use the
          non-human-shaped pictures you have provided regarding
          inaccurate recognition. By inputting the non-human-shaped
          pictures into the algorithm, the system will conduct
          autonomous learning to help improve the accuracy of AI
          Obstacle Recognition. And you have the right at any time,
          either through the APP or by contacting us, to refuse to
          participate in the aforementioned artificial intelligence
          training and product improvement.

          At the same time, we fully respect your rights to personal
          information. For the personal information collected from
          your use of this function, you can exercise the right to
          delete and other rights in accordance with the "Smart
          Robotic Mower Privacy Policy". You can also choose to
          delete pictures and videos in the App. When you choose to
          delete in the App, the pictures and videos will also be
          deleted promptly on the server side.

          If you have any comments or questions about this privacy
          policy, or if you have any questions about our collection,
          use, or disclosure of your personal information for this
          function, please contact us through the contact information
          disclosed in the "Smart Robotic Mower Privacy Policy"!

          Thank you for taking the time to understand the privacy
          policy of this function!
      - type: horizontal-stack
        cards:
          - type: button
            name: Back to Mowing Settings
            icon: mdi:arrow-left
            tap_action:
              action: navigate
              navigation_path: /lovelace-mower/mowing-settings
          - type: button
            name: Also fire as notification
            icon: mdi:bell-plus-outline
            tap_action:
              action: call-service
              service: dreame_a2_mower.show_photo_privacy_policy
