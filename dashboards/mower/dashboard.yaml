# Dreame A2 Mower — showcase dashboard
# Updated 2026-05-11 (entity_ids corrected against live HA inventory).
#
# Per-map flipping uses `select.dreame_a2_mower_active_map`'s
# `current_map_id` attribute (added in the integration via v1.0.4a2).
#
# Per-map entity naming is ASYMMETRIC between map_0 and map_1:
#   map_0 entities were registered before the per-map name fix, so they
#   carry the mower-level prefix (e.g. switch.dreame_a2_mower_edge_mowing_auto).
#   map_1 entities were registered after the fix, so they use the
#   map_2_* prefix (e.g. switch.map_2_automatic_edge_mowing).
#
# Required helpers (add via Settings → Devices → Helpers, or copy
# `docs/superpowers/helpers/dreame-a2-helpers.yaml` into configuration.yaml):
#   - input_number.dreame_a2_mower_wifi_overlay_opacity
#   - input_number.dreame_a2_mower_lidar_tilt
#
# Required custom cards (install via HACS Frontend):
#   - card-mod      (for WiFi overlay opacity binding)
#   - dreame-a2-lidar-card  (bundled with the integration)
#
# Map count is 2 (live mower). Adding a 3rd map: copy any
# `conditional` block, change the state value to 2, and update
# entity references to match that map's registered naming.

# Per-map view header anchor — defined here, aliased from each per-map view
_per_map_header: &per_map_header
  type: horizontal-stack
  cards:
    - type: conditional
      conditions:
        - condition: state
          entity: select.dreame_a2_mower_active_map
          attribute: current_map_id
          state: 0
      card:
        type: picture-entity
        entity: camera.dreame_a2_mower_map_1
        name: "Map 1"
        camera_view: auto
        show_state: false
        aspect_ratio: 16:9
        tap_action:
          action: none
        hold_action:
          action: none
    - type: conditional
      conditions:
        - condition: state
          entity: select.dreame_a2_mower_active_map
          attribute: current_map_id
          state: 1
      card:
        type: picture-entity
        entity: camera.dreame_a2_mower_map_2
        name: "Map 2"
        camera_view: auto
        show_state: false
        aspect_ratio: 16:9
        tap_action:
          action: none
        hold_action:
          action: none
    - type: markdown
      content: >-
        **Active map**

        {{ states('select.dreame_a2_mower_active_map') }}


        _Switch on the **Map Selector** tab._

title: Dreame A2 Mower

# Custom cards used by this dashboard — register these as Lovelace
# resources via Settings → Dashboards → ⋮ → Resources. Per-dashboard
# YAML files cannot self-declare resources; the Resources UI is the
# authoritative source.
#
#   /hacsfiles/atomic-calendar-revive/atomic-calendar-revive.js (module)
#   /dreame_a2_mower/dreame-a2-lidar-card.js (module)
#   /dreame_a2_mower/dreame-a2-schedule-card.js (module)

views:
  - title: Mower
    path: mower
    icon: mdi:robot-mower-outline
    cards:
      # Header: thumbnail + nav to Map Selector
      - *per_map_header

      # PIN-required emergency-stop banner
      - type: conditional
        conditions:
          - entity: binary_sensor.dreame_a2_mower_emergency_stop_activated
            state: "on"
        card:
          type: markdown
          content: |
            ## ⚠️ Emergency stop activated
            Enter the PIN code on the robot to unlock it. The mower
            will not mow until the PIN is accepted.

      # Hero: live map for active map (active-map follower camera)
      - type: picture-entity
        entity: camera.dreame_a2_mower_map
        name: Live Map
        camera_view: auto
        show_state: false
        aspect_ratio: 637x717
        tap_action:
          action: none
        hold_action:
          action: none

      # State + sensors — surfaces the v1.0.8 state-machine entities
      # (current_activity, location, positioning_health, mqtt connectivity)
      # alongside battery + session area + the legacy in-dock / obstacle / rain flags.
      - type: entities
        title: State
        entities:
          - entity: lawn_mower.dreame_a2_mower
          - entity: sensor.dreame_a2_mower_current_activity
          - entity: sensor.dreame_a2_mower_location
          - entity: binary_sensor.dreame_a2_mower_mowing_session_active
            name: Mowing session active
          - entity: sensor.dreame_a2_mower_battery
          - entity: sensor.dreame_a2_mower_charging_status
          - entity: binary_sensor.dreame_a2_mower_mower_in_dock
            name: In dock
          - entity: sensor.dreame_a2_mower_positioning_health
          - entity: sensor.dreame_a2_mower_mqtt_connectivity
          - entity: binary_sensor.dreame_a2_mower_obstacle_detected
          - entity: binary_sensor.dreame_a2_mower_rain_protection_active
          - entity: sensor.dreame_a2_mower_active_selection
          - entity: sensor.dreame_a2_mower_area_mowed
            name: Session area mowed (m²)

      # Action row — state-aware. Find is always shown; the other rows
      # are mutually exclusive based on (current_activity, charging_status,
      # in_dock, mowing_session_active).

      # Find — always available
      - type: horizontal-stack
        cards:
          - type: button
            entity: button.dreame_a2_mower_find_my_robot
            icon: mdi:radar
            name: Find
            show_state: false

      # Row: Charging in mow → Continue · End
      - type: conditional
        conditions:
          - entity: binary_sensor.dreame_a2_mower_mowing_session_active
            state: "on"
          - entity: sensor.dreame_a2_mower_charging_status
            state: charging
        card:
          type: horizontal-stack
          cards:
            - type: button
              entity: button.dreame_a2_mower_start_mowing
              icon: mdi:play
              name: Continue
              show_state: false
            - type: button
              entity: button.dreame_a2_mower_stop
              icon: mdi:stop
              name: End
              show_state: false

      # Row: Charging not in mow → Start
      - type: conditional
        conditions:
          - entity: binary_sensor.dreame_a2_mower_mowing_session_active
            state: "off"
          - entity: sensor.dreame_a2_mower_charging_status
            state: charging
        card:
          type: horizontal-stack
          cards:
            - type: button
              entity: button.dreame_a2_mower_start_mowing
              icon: mdi:play
              name: Start
              show_state: false

      # Row: In dock, not charging → Start · Recharge
      - type: conditional
        conditions:
          - entity: binary_sensor.dreame_a2_mower_mower_in_dock
            state: "on"
          - entity: sensor.dreame_a2_mower_charging_status
            state: not_charging
          - entity: binary_sensor.dreame_a2_mower_mowing_session_active
            state: "off"
        card:
          type: horizontal-stack
          cards:
            - type: button
              entity: button.dreame_a2_mower_start_mowing
              icon: mdi:play
              name: Start
              show_state: false
            - type: button
              entity: button.dreame_a2_mower_recharge
              icon: mdi:battery-charging
              name: Recharge
              show_state: false

      # Row: Doing-something (mowing / cruising / mapping / returning) → Pause · End · Recharge
      - type: conditional
        conditions:
          - entity: sensor.dreame_a2_mower_current_activity
            state:
              - mowing
              - cruising_to_point
              - fast_mapping
              - returning
              - repositioning
        card:
          type: horizontal-stack
          cards:
            - type: button
              entity: button.dreame_a2_mower_pause
              icon: mdi:pause
              name: Pause
              show_state: false
            - type: button
              entity: button.dreame_a2_mower_stop
              icon: mdi:stop
              name: End
              show_state: false
            - type: button
              entity: button.dreame_a2_mower_recharge
              icon: mdi:battery-charging
              name: Recharge
              show_state: false

      # Row: Paused in session → Continue · End · Recharge
      - type: conditional
        conditions:
          - entity: sensor.dreame_a2_mower_current_activity
            state: paused
        card:
          type: horizontal-stack
          cards:
            - type: button
              entity: button.dreame_a2_mower_start_mowing
              icon: mdi:play
              name: Continue
              show_state: false
            - type: button
              entity: button.dreame_a2_mower_stop
              icon: mdi:stop
              name: End
              show_state: false
            - type: button
              entity: button.dreame_a2_mower_recharge
              icon: mdi:battery-charging
              name: Recharge
              show_state: false

      # Row: Stopped on lawn idle (error / arrived at maintenance point) → Recharge
      - type: conditional
        conditions:
          - entity: sensor.dreame_a2_mower_current_activity
            state: idle
          - entity: binary_sensor.dreame_a2_mower_mower_in_dock
            state: "off"
          - entity: binary_sensor.dreame_a2_mower_mowing_session_active
            state: "off"
        card:
          type: horizontal-stack
          cards:
            - type: button
              entity: button.dreame_a2_mower_recharge
              icon: mdi:battery-charging
              name: Recharge
              show_state: false

      # Mowing target — single dropdown bound to the action mode; the
      # per-type target picker shows below based on the chosen mode.
      - type: entities
        title: Mowing target
        entities:
          - entity: select.dreame_a2_mower_action_mode
            name: Mode
      - type: conditional
        conditions:
          - entity: select.dreame_a2_mower_action_mode
            state: zone
        card:
          type: entities
          entities:
            - entity: select.dreame_a2_mower_zone
              name: Zone
      - type: conditional
        conditions:
          - entity: select.dreame_a2_mower_action_mode
            state: spot
        card:
          type: entities
          entities:
            - entity: select.dreame_a2_mower_spot
              name: Spot
      - type: conditional
        conditions:
          - entity: select.dreame_a2_mower_action_mode
            state: edge
        card:
          type: entities
          entities:
            - entity: select.dreame_a2_mower_edge
              name: Edge

      # GPS map — disabled until we identify a working live-location source.
      # Original YAML kept in the .pre-cleanup-20260513.yaml.bak file.
      - type: markdown
        content: |
          ### 🚧 GPS Tracking
          Work in progress — Dreame does not expose live GPS
          coordinates over the cloud API. The map will reappear here
          once we identify the correct source.

      # Head-to-Maintenance-Point — disabled until the cruise op is reachable.
      - type: markdown
        content: |
          ### 🚧 Head to Maintenance Point
          Work in progress — the cruise-to-point command (op=109) is
          not routable from the integration via the cloud-RPC surface.
          See `docs/research/cruise-to-point-todo.md`.

  - title: Map Selector
    path: maps
    icon: mdi:map-marker-multiple
    cards:
      - type: markdown
        content: |
          # Pick the active map

          Tap a map to zoom in. Press **Select** to make that map the
          active map for the rest of the dashboard (mowing target,
          schedule, settings). Switching is blocked during an active
          mow — you'll see a notification if the API refuses.

      # Map 1 tile + select button
      - type: vertical-stack
        cards:
          - type: picture-entity
            entity: camera.dreame_a2_mower_map_1
            name: "Map 1"
            camera_view: auto
            show_state: false
            tap_action:
              action: more-info
          - type: horizontal-stack
            cards:
              - type: markdown
                content: >-
                  **Map 1**
                  {% if state_attr('select.dreame_a2_mower_active_map',
                  'current_map_id') | int(-1) == 0 %}
                  🟢 Currently active
                  {% else %}
                  ⚪ Inactive
                  {% endif %}
              - type: button
                name: Select Map 1
                icon: mdi:map-check
                tap_action:
                  action: call-service
                  service: select.select_option
                  target:
                    entity_id: select.dreame_a2_mower_active_map
                  data:
                    option: "Map 1"

      # Map 2 tile + select button
      - type: vertical-stack
        cards:
          - type: picture-entity
            entity: camera.dreame_a2_mower_map_2
            name: "Map 2"
            camera_view: auto
            show_state: false
            tap_action:
              action: more-info
          - type: horizontal-stack
            cards:
              - type: markdown
                content: >-
                  **Map 2**
                  {% if state_attr('select.dreame_a2_mower_active_map',
                  'current_map_id') | int(-1) == 1 %}
                  🟢 Currently active
                  {% else %}
                  ⚪ Inactive
                  {% endif %}
              - type: button
                name: Select Map 2
                icon: mdi:map-check
                tap_action:
                  action: call-service
                  service: select.select_option
                  target:
                    entity_id: select.dreame_a2_mower_active_map
                  data:
                    option: "Map 2"

      - type: entities
        title: Map metadata
        entities:
          - entity: sensor.map_1_name
            name: Map 1 — name
          - entity: sensor.map_1_area
            name: Map 1 — area
          - entity: sensor.map_1_segments
            name: Map 1 — segments
          - entity: sensor.map_2_name
            name: Map 2 — name
          - entity: sensor.map_2_area
            name: Map 2 — area
          - entity: sensor.map_2_segments
            name: Map 2 — segments

  - title: Settings & Zones
    path: settings-zones
    icon: mdi:tune
    cards:
      - type: markdown
        content: |
          ## Active map: {{ states('select.dreame_a2_mower_active_map') }}
          Switch maps on the **Map Selector** tab.

      # Base map for the active map. The per-map camera renders the
      # base PNG when the live trail is NOT active on that map_id, so
      # both map_1 and map_2 show as base-only here unless the active
      # mow is happening on this tab's map at this moment.
      - type: conditional
        conditions:
          - condition: state
            entity: select.dreame_a2_mower_active_map
            attribute: current_map_id
            state: 0
        card:
          type: picture-entity
          entity: camera.dreame_a2_mower_map_1
          name: "Map 1 — base"
          camera_view: auto
          show_state: false
          tap_action:
            action: more-info
      - type: conditional
        conditions:
          - condition: state
            entity: select.dreame_a2_mower_active_map
            attribute: current_map_id
            state: 1
        card:
          type: picture-entity
          entity: camera.dreame_a2_mower_map_2
          name: "Map 2 — base"
          camera_view: auto
          show_state: false
          tap_action:
            action: more-info

      # Per-zone-type list cards. Read-only — write surface unknown
      # (see docs/research/map-edit-write-todo.md).
      - type: entities
        title: Exclusion zones
        show_header_toggle: false
        entities:
          - entity: sensor.dreame_a2_mower_exclusion_zones
            name: Count
      - type: entities
        title: Ignore-obstacle zones
        show_header_toggle: false
        entities:
          - entity: sensor.dreame_a2_mower_designated_ignore_zones
            name: Count
      - type: entities
        title: Spots
        show_header_toggle: false
        entities:
          - entity: select.dreame_a2_mower_spot
            name: Spot list
      - type: entities
        title: Maintenance points
        show_header_toggle: false
        entities:
          - entity: sensor.map_1_maintenance_points
            name: Map 1 — points (count)
          - entity: sensor.map_2_maintenance_points
            name: Map 2 — points (count)
      - type: markdown
        content: >
          Read-only — all map edits happen in the Dreame app. See
          `docs/research/map-edit-write-todo.md` for the write-surface
          research status.

      # General Mode — the 7 per-map settings switches
      # map_0: legacy dreame_a2_mower_* naming
      - type: conditional
        conditions:
          - condition: state
            entity: select.dreame_a2_mower_active_map
            attribute: current_map_id
            state: 0
        card:
          type: entities
          title: General Mode (Map 1)
          entities:
            - entity: switch.dreame_a2_mower_edge_mowing_auto
            - entity: switch.dreame_a2_mower_edge_mowing_safe
            - entity: switch.dreame_a2_mower_edge_mowing_obstacle_avoidance
            - entity: switch.dreame_a2_mower_obstacle_avoidance_enabled
            - entity: switch.dreame_a2_mower_ai_obstacle_recognition_humans
            - entity: switch.dreame_a2_mower_ai_obstacle_recognition_animals
            - entity: switch.dreame_a2_mower_ai_obstacle_recognition_objects
      # map_1: new map_2_* naming
      - type: conditional
        conditions:
          - condition: state
            entity: select.dreame_a2_mower_active_map
            attribute: current_map_id
            state: 1
        card:
          type: entities
          title: General Mode (Map 2)
          entities:
            - entity: switch.map_2_automatic_edge_mowing
            - entity: switch.map_2_safe_edge_mowing
            - entity: switch.map_2_obstacle_avoidance_on_edges
            - entity: switch.map_2_lidar_obstacle_recognition
            - entity: switch.map_2_ai_obstacle_recognition_humans
            - entity: switch.map_2_ai_obstacle_recognition_animals
            - entity: switch.map_2_ai_obstacle_recognition_objects

      # Zone editor — per-map zone/spot/edge targets
      # map_0: legacy dreame_a2_mower_* naming
      - type: conditional
        conditions:
          - condition: state
            entity: select.dreame_a2_mower_active_map
            attribute: current_map_id
            state: 0
        card:
          type: entities
          title: Zone editor (Map 1)
          entities:
            - entity: select.dreame_a2_mower_zone
              name: Zone target
            - entity: select.dreame_a2_mower_spot
              name: Spot target
            - entity: select.dreame_a2_mower_edge
              name: Edge target
      # map_1: new map_2_* naming
      - type: conditional
        conditions:
          - condition: state
            entity: select.dreame_a2_mower_active_map
            attribute: current_map_id
            state: 1
        card:
          type: entities
          title: Zone editor (Map 2)
          entities:
            - entity: select.map_2_zone
              name: Zone target
            - entity: select.map_2_spot
              name: Spot target
            - entity: select.map_2_edge
              name: Edge target

      # Plan 2 placeholders
      - type: markdown
        content: |
          ### 🚧 Custom Mode (Plan 2)

          Per-zone settings overrides. Read via
          `sensor.dreame_a2_mower_map_N_custom_mode_overrides` (state
          attributes list zones with overrides). Write via services
          `dreame_a2_mower.set_zone_setting(map_id, zone_id, key,
          value)` and `dreame_a2_mower.clear_zone_setting(map_id,
          zone_id, key)`.

      - type: markdown
        content: |
          ### 🚧 Pathway Obstacle Avoidance (Plan 2)

          Per-map switch + sub-numbers for sensitivity/threshold.

  - title: Schedule
    path: schedule
    icon: mdi:calendar-clock
    cards:
      - *per_map_header

      - type: markdown
        content: |
          # Schedule
          Read-only on cloud (BT writes would need a separate path).

      # Weekly grid — `custom:dreame-a2-schedule-card` is bundled with
      # the integration at /www/dreame-a2-schedule-card.js. It renders
      # the per-slot `plans` (time + days + mode) as a 7-day grid.
      - type: custom:dreame-a2-schedule-card
        sensor: sensor.dreame_a2_mower_schedule_count

      # Per-slot list — markdown templated off the slots attribute.
      - type: markdown
        content: >-
          ### Slots


          {% set slots = state_attr('sensor.dreame_a2_mower_schedule_count', 'slots') or [] %}

          {% if not slots %}

          _No schedule slots configured._

          {% else %}

          {% for s in slots %}

          **Slot {{ s.slot_id }} — {{ s.name }}**

          {% for p in s.plans %}

          - `{{ p.time }}` · {{ p.days | join(', ') }} · {{ p.action }}{% if p.zone_id %} (zone {{ p.zone_id }}){% endif %}

          {% endfor %}


          {% endfor %}

          {% endif %}

      - type: entities
        title: Device-wide time windows
        entities:
          - entity: time.dreame_a2_mower_dnd_start_time
            name: DnD start
          - entity: time.dreame_a2_mower_dnd_end_time
            name: DnD end
          - entity: time.dreame_a2_mower_low_speed_at_night_start_time
            name: Low-speed start
          - entity: time.dreame_a2_mower_low_speed_at_night_end_time
            name: Low-speed end
          - entity: time.dreame_a2_mower_charging_start_time
            name: Charging start
          - entity: time.dreame_a2_mower_charging_end_time
            name: Charging end

  - title: LiDAR
    path: lidar
    icon: mdi:radar
    cards:
      - type: markdown
        content: |
          # LiDAR point clouds
          Pick any archived scan; the 3D view below updates. Drag to
          orbit, scroll to zoom, **⛶** for fullscreen.

      - type: entities
        title: Archive
        entities:
          - entity: sensor.dreame_a2_mower_lidar_archive_count
            name: Total scans
          - entity: select.dreame_a2_mower_lidar_archive
            name: Selected scan

      - type: custom:dreame-a2-lidar-card
        url: /api/dreame_a2_mower/lidar/selected.pcd
        picker_entity: select.dreame_a2_mower_lidar_archive

      - type: markdown
        content: |
          ### Re-tag a mis-categorized scan
          Use **Developer Tools → Services** with
          `dreame_a2_mower.move_lidar_scan` — provide `from_map_id`,
          `filename` (from picker option text), `to_map_id`.

  - title: WiFi Coverage
    path: wifi
    icon: mdi:wifi
    cards:
      - type: markdown
        content: |
          # WiFi heatmap
          Pick any heatmap from the archive. The viewer overlays it on
          the corresponding map's base snapshot. Adjust opacity, flip,
          or hide the base map with the controls below.

      - type: entities
        title: Viewer controls
        show_header_toggle: false
        entities:
          - entity: select.dreame_a2_mower_wifi_archive
            name: Heatmap
          - entity: input_boolean.dreame_a2_mower_wifi_flip_x
            name: Flip X (override)
            icon: mdi:flip-horizontal
          - entity: input_boolean.dreame_a2_mower_wifi_flip_y
            name: Flip Y (override)
            icon: mdi:flip-vertical
          - entity: sensor.dreame_a2_mower_wifi_map_last_refresh
            name: Last refresh

      # Heatmap alone via picture-entity. Base-map overlay was attempted
      # via picture-elements with image_entity — broken across HA's
      # streaming-vs-static camera proxy paths for our custom static
      # cameras. Deferred until heatmap → map_id correlation is solved
      # (see docs/research/wifi-heatmap-todo.md Issue #4).
      - type: picture-entity
        entity: camera.dreame_a2_mower_wifi_heatmap_selected
        name: WiFi heatmap
        camera_view: auto
        show_state: false
        tap_action:
          action: none
        hold_action:
          action: none
      - type: entities
        entities:
          - entity: button.dreame_a2_mower_refresh_wifi_heatmaps
            name: Refresh WiFi heatmaps (all maps)

  - title: Sessions
    path: sessions
    icon: mdi:history
    cards:
      - type: markdown
        content: |
          # Mowing session history

          All sessions, across both maps, sorted recent-first. The
          map below renders the session's recorded map_id (NOT the
          active map). Picking a Map 2 session shows Map 2's geometry
          regardless of which map is currently active.

      # Calendar view of archived sessions via HACS
      # `atomic-calendar-revive`. Per-event tap_action to pick a
      # session for replay requires per-version template-variable
      # syntax we haven't fully confirmed — for now the popup shows
      # the event details and the user picks the matching label from
      # the Replay picker below. (Calendar event `summary` is
      # formatted to match the work_log option label byte-for-byte by
      # calendar.py for easy identification.)
      - type: custom:atomic-calendar-revive
        name: Mowing sessions
        defaultMode: Calendar
        maxDaysToShow: 31
        showColors: true
        showLocation: false
        showRelativeTime: false
        entities:
          - entity: calendar.dreame_a2_mower_sessions
            icon: mdi:robot-mower
            # Per-event tap → pick this session in the Replay picker
            # below. Atomic Calendar Revive substitutes
            # <calendar-event-title> at fire time with the event's
            # summary string, which calendar.py formats to match the
            # work_log select's option label exactly.
            tap_action:
              action: call-service
              service: select.select_option
              data:
                entity_id: select.dreame_a2_mower_work_log
                option: <calendar-event-title>

      - type: entities
        title: Replay picker
        entities:
          - entity: select.dreame_a2_mower_work_log
            name: Session

      - type: picture-entity
        entity: camera.dreame_a2_mower_work_log
        name: Session replay
        camera_view: auto
        show_state: false
        tap_action:
          action: none
        hold_action:
          action: none

      - type: entities
        title: Session details
        entities:
          - entity: sensor.dreame_a2_mower_latest_session_duration
            name: Latest duration
          - entity: sensor.dreame_a2_mower_latest_session_area
            name: Latest area mowed (m²)
          - entity: sensor.dreame_a2_mower_latest_session_time
            name: Latest started at
          - entity: sensor.dreame_a2_mower_archived_session_count
            name: Archived session count
          - entity: sensor.dreame_a2_mower_session_distance
            name: Live session distance (m)
          - entity: sensor.dreame_a2_mower_session_track_point_count
            name: Live session points

      - type: entities
        title: Per-map session totals
        entities:
          - entity: sensor.map_1_total_area_mowed
            name: Map 1 — total area mowed
          - entity: sensor.map_1_total_mowing_time
            name: Map 1 — total time
          - entity: sensor.map_1_mowing_sessions
            name: Map 1 — sessions
          - entity: sensor.map_2_total_area_mowed
            name: Map 2 — total area mowed
          - entity: sensor.map_2_total_mowing_time
            name: Map 2 — total time
          - entity: sensor.map_2_mowing_sessions
            name: Map 2 — sessions

