    name: "map_data_signal"
    category: "property"
    payload_shape: "int — observed values {200, 201, 300}"
    semantic: |
      Map-readiness signal. Cycles among {200, 201, 300} to signal "new
      map available" (and possibly map-pipeline lifecycle phases).

      Value 300 fires at auto-recharge-leg-start (the exact millisecond
      s2p2 → 54 and s2p1 → 2 → 5), confirmed twice in the 2026-04-20
      full-run at 09:14:09 and 11:13:04. Primary mid-session "map may
      have been refreshed" signal; triggers the upstream map pipeline.

      NOT a session-completion signal — that is the event_occured
      siid=4 eiid=1. The 2026-04-20 run produced two s6p1=300 pushes
      (one per recharge interrupt) plus one event_occured.

      Value 200 observed during normal mowing states.
      Value 201 first observed 2026-05-15 12:18:49 — semantic unknown;
      possibly an intermediate map-state phase or a per-firmware-build
      variant of 200. Worth capturing more occurrences with surrounding
      context to decode.

      Surfaced as s6p1_raw diagnostic sensor.
    status:
      seen_on_wire: true
      first_seen: "2026-04-17"
      last_seen: "2026-05-15"
      decoded: confirmed
      bt_only: false
      not_on_g2408: false
    references:
      integration_code: "custom_components/dreame_a2_mower/mower/property_mapping.py:147"
      protocol_doc: "docs/research/inventory/generated/g2408-canonical.md § Events"
    verifications:
      - date: "2026-05-15"
        status: partial
        claim: "Value 201 observed for the first time at 2026-05-15 12:18:49 (probe_log_20260514_211550.jsonl). Previously the slot was documented as cycling only between 200 and 300 — 201 is a third distinct value."
        evidence: "probe_log_20260514_211550.jsonl @ 2026-05-15 12:18:49 (first 201); subsequent 201 observations same day"
      - date: "2026-05-16"
        status: verified
        claim: |
          s6p1 is the map-pipeline state signal, not a notification source.
          Cross-corpus correlation (50 events across April-May 2026) shows
          clean co-occurrence with specific s2p2 notification codes:

            value 300: ALWAYS within ±60s of s2p2=54 (low_battery_return).
              5/5 cases; s6p1 leads by 0-1s. Map-snapshot-at-low-battery-
              interrupt — partial trail uploaded so the cloud has the
              session state before the mower returns to dock.

            value 201: ALWAYS within ±60s of s2p2=56 (rain_protection).
              4/4 cases; s2p2 leads by 0-31s. Map-snapshot-at-rain-
              interrupt. Previously undocumented value.

            value 200: mixed correlation — fires near mowing-started
              events and occasionally during steady-state mowing. Likely
              the "normal/idle" map-pipeline state.

          The asymmetric ordering (s6p1 leads s2p2 for battery, follows for
          rain) suggests s6p1 and s2p2 are independent emissions of the
          same firmware event rather than one causing the other. Both
          are side effects of the underlying "session-interrupt-with-
          partial-map-snapshot" handler in the firmware.
        evidence: "Correlation analysis across 8 probe_log_*.jsonl files (50 s6p1 events) vs the IMG_4519-4524 app-notification history; documented in docs/research/app-notification-history-2026-05-16.md"
    open_questions:
      - "Does s6p1 fire at any session-interrupt OTHER than low-battery and rain (e.g., emergency stop, top-cover-open, fault recovery)? The corpus we have hasn't captured those — likely sparse observations."
      - "Are there s6p1 values beyond {200, 201, 300}? value_catalog might be larger; capture novel observations into a persistent log (see project-persistent-novel-log-todo) to find out."

